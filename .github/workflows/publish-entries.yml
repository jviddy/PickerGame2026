name: Publish entries

on:
  workflow_dispatch:
    inputs:
      triggeredBy:
        description: What started this publish
        required: false
        default: manual
  push:
    branches: [main]
    paths:
      - 'PickerGame/**.html'
      - 'PickerGame/functions/**'
      - 'PickerGame/scripts/**'
      - 'PickerGame/src/**'
      - 'Data/**'
      - '.github/workflows/publish-entries.yml'

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: PickerGame

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: PickerGame/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export entries, build scores, and deploy
        run: npm run entries:publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
