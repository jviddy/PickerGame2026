<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PickerGame Admin</title>
  <style>
    :root {
      --pitch: #1a3352;
      --pitch-mid: #2d5a8e;
      --pitch-bright: #3d7bc4;
      --lime: #5a9fd4;
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d9e2dc;
      --soft: #f5f8f6;
      --gold: #d79a2b;
      --danger: #b91c1c;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: #f0f4f8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      color: var(--white);
      background: linear-gradient(135deg, #1a3352 0%, #1e4070 100%);
      box-shadow: 0 2px 10px rgba(11, 79, 47, 0.24);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      letter-spacing: 0;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
    }

    main {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto 40px;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 10px;
      padding: 14px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--ink);
      font: inherit;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      color: var(--white);
      background: var(--pitch-mid);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { background: var(--pitch); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .save-btn { background: var(--pitch-bright); }
    .save-btn:hover:not(:disabled) { background: var(--pitch-mid); }
    .publish { background: var(--gold); color: #2f2205; }
    .publish:hover:not(:disabled) { background: #bd8520; }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 0 14px 12px;
      align-items: center;
    }

    .filter-bar span {
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 2px;
    }

    .filter-btn {
      min-height: 30px;
      padding: 4px 12px;
      background: var(--soft);
      color: var(--muted);
      border: 1px solid var(--line);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .filter-btn:hover:not(:disabled) { background: #e2eae5; }
    .filter-btn.active { background: var(--pitch-mid); color: var(--white); border-color: var(--pitch-mid); }

    .status {
      min-height: 22px;
      padding: 0 14px 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--pitch); }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 960px;
      background: var(--white);
    }

    th, td {
      padding: 9px 10px;
      border-top: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 0.9rem;
    }

    th {
      color: var(--muted);
      background: #fbfcfb;
      font-size: 0.76rem;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody tr:nth-child(10n) { background: #f2f4f3; }

    td.paid-cell {
      text-align: center;
      vertical-align: middle;
      width: 48px;
    }

    input[type="checkbox"] {
      width: 17px;
      height: 17px;
      cursor: pointer;
      accent-color: var(--pitch-mid);
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 800;
    }

    .badge-paid { background: #dcfce7; color: #166534; }
    .badge-pending { background: #f1f5f9; color: var(--muted); }
    .badge-removed { background: #fef2f2; color: #991b1b; }

    tr.removed-row td { opacity: 0.45; }
    tr.removed-row .team-name { text-decoration: line-through; }

    .remove-btn {
      min-height: 28px;
      padding: 3px 10px;
      font-size: 0.76rem;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .remove-btn:hover:not(:disabled) { background: #fecaca; }
    .restore-btn {
      min-height: 28px;
      padding: 3px 10px;
      font-size: 0.76rem;
      background: var(--soft);
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .restore-btn:hover:not(:disabled) { background: #e2eae5; }

    .team-name {
      font-weight: 900;
      color: var(--pitch);
    }

    .muted {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .picks {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      max-width: 420px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      background: #eaf4ee;
      color: var(--pitch);
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .empty {
      padding: 28px 14px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .topbar-inner, .summary { display: block; }
      .nav { margin-top: 10px; justify-content: flex-start; }
      .controls { grid-template-columns: 1fr; }
      button { width: 100%; }
      .filter-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>PickerGame Admin</h1>
      <nav class="nav" aria-label="Admin navigation">
        <a href="admin-results.html">Results Admin</a>
        <a href="entry.html">Entry</a>
        <a href="entries.html">Entries</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="countries.html">Countries</a>
        <a href="schedule.html">Matches</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="controls">
        <label>
          Admin token
          <input id="adminToken" type="password" autocomplete="current-password" />
        </label>
        <button id="loadBtn" type="button">Load entries</button>
        <button id="updateBtn" class="publish" type="button" disabled>Update status</button>
      </div>
      <div class="filter-bar">
        <span>Filter:</span>
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="paid" type="button">Paid</button>
        <button class="filter-btn" data-filter="pending" type="button">Pending</button>
        <button class="filter-btn" data-filter="removed" type="button">Removed</button>
      </div>
      <div id="status" class="status">Enter your admin token to review submitted entries.</div>
      <div class="summary">
        <span id="entryCount">0 entries</span>
        <span id="latestEntry">No submissions loaded</span>
      </div>
      <div class="table-wrap">
        <table aria-label="Submitted entries">
          <thead>
            <tr>
              <th>Paid</th>
              <th>Status</th>
              <th></th>
              <th>Team</th>
              <th>Entrant</th>
              <th>Email</th>
              <th>Cost</th>
              <th>Tiebreakers</th>
              <th>Picks</th>
              <th>Submitted</th>
            </tr>
          </thead>
          <tbody id="entriesBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty">No entries loaded.</div>
    </section>
  </main>

  <script>
    const tokenInput = document.getElementById('adminToken');
    const loadBtn = document.getElementById('loadBtn');
    const updateBtn = document.getElementById('updateBtn');
    const statusEl = document.getElementById('status');
    const entryCountEl = document.getElementById('entryCount');
    const latestEntryEl = document.getElementById('latestEntry');
    const entriesBody = document.getElementById('entriesBody');
    const emptyState = document.getElementById('emptyState');

    const savedToken = localStorage.getItem('pickerGameAdminToken') || '';
    tokenInput.value = savedToken;

    let allEntries = [];
    let activeFilter = 'all';

    function setStatus(message, type = '') {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function getToken() {
      return tokenInput.value.trim();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function formatDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
    }

    function getCheckedPaidIds() {
      // Build a map of id → checkbox state for every entry currently in the DOM
      const visibleState = {};
      entriesBody.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
        visibleState[cb.dataset.entryId] = cb.checked;
      });

      // For every non-removed entry: if it's visible use its checkbox state,
      // if it's hidden (filtered out) preserve its existing paid state.
      return allEntries
        .filter((e) => {
          if (e.removed) return false;
          const key = String(e.id);
          return key in visibleState ? visibleState[key] : e.paid;
        })
        .map((e) => e.id);
    }

    function getRemovedIds() {
      return allEntries.filter((e) => e.removed).map((e) => e.id);
    }

    function renderEntries(entries) {
      const filtered = entries.filter((e) => {
        if (activeFilter === 'paid') return e.paid && !e.removed;
        if (activeFilter === 'pending') return !e.paid && !e.removed;
        if (activeFilter === 'removed') return e.removed;
        return !e.removed; // "all" hides removed by default
      });

      entriesBody.innerHTML = filtered.map((entry) => {
        const picks = (entry.selectedTeams || [])
          .map((team) => `<span class="pill">${escapeHtml(team)}</span>`)
          .join('');
        const tiebreakers = (entry.tieBreakerAnswers || []).map(escapeHtml).join(' / ');
        const badge = entry.removed
          ? '<span class="badge badge-removed">Removed</span>'
          : entry.paid
            ? '<span class="badge badge-paid">Paid</span>'
            : '<span class="badge badge-pending">Pending</span>';
        const removeBtn = entry.removed
          ? `<button class="restore-btn" type="button" data-entry-id="${escapeHtml(entry.id)}">Restore</button>`
          : `<button class="remove-btn" type="button" data-entry-id="${escapeHtml(entry.id)}">Remove</button>`;

        return `
          <tr class="${entry.removed ? 'removed-row' : ''}">
            <td class="paid-cell">
              <input type="checkbox" data-entry-id="${escapeHtml(entry.id)}" ${entry.paid && !entry.removed ? 'checked' : ''} ${entry.removed ? 'disabled' : ''} aria-label="Mark ${escapeHtml(entry.teamName)} as paid" />
            </td>
            <td>${badge}</td>
            <td>${removeBtn}</td>
            <td>
              <div class="team-name">${escapeHtml(entry.teamName)}</div>
              <div class="muted">${escapeHtml(entry.id)}</div>
            </td>
            <td>${escapeHtml(entry.entrantName)}</td>
            <td>${escapeHtml(entry.email)}</td>
            <td>£${escapeHtml(entry.totalCost)}m</td>
            <td>${tiebreakers}</td>
            <td><div class="picks">${picks}</div></td>
            <td>${escapeHtml(formatDate(entry.submittedAt))}</td>
          </tr>
        `;
      }).join('');

      // Wire remove/restore buttons
      entriesBody.querySelectorAll('.remove-btn, .restore-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.entryId;
          allEntries = allEntries.map((e) =>
            e.id === id ? { ...e, removed: !e.removed, paid: e.removed ? e.paid : false } : e,
          );
          renderEntries(allEntries);
        });
      });

      emptyState.style.display = filtered.length ? 'none' : 'block';
      const active = entries.filter((e) => !e.removed);
      entryCountEl.textContent = `${active.length} active · ${active.filter((e) => e.paid).length} paid · ${entries.filter((e) => e.removed).length} removed`;
      latestEntryEl.textContent = entries[0]
        ? `Latest: ${formatDate(entries[0].submittedAt)}`
        : 'No submissions loaded';
      updateBtn.disabled = false;
    }

    async function requestJson(url, options = {}) {
      const token = getToken();
      if (!token) throw new Error('Enter your admin token.');
      localStorage.setItem('pickerGameAdminToken', token);

      const response = await fetch(url, {
        ...options,
        headers: { ...(options.headers || {}), 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error((data.errors || ['Request failed.']).join(' '));
      }
      return data;
    }

    async function loadEntries() {
      loadBtn.disabled = true;
      updateBtn.disabled = true;
      setStatus('Loading entries...');

      try {
        const data = await requestJson('/api/admin/entries');
        allEntries = data.entries || [];
        renderEntries(allEntries);
        setStatus('Entries loaded.', 'success');
      } catch (error) {
        entriesBody.innerHTML = '';
        emptyState.style.display = 'block';
        setStatus(error.message, 'error');
      } finally {
        loadBtn.disabled = false;
      }
    }

    async function updateStatus() {
      updateBtn.disabled = true;
      setStatus('Saving payment statuses and publishing...');

      const paidIds = getCheckedPaidIds();
      const removedIds = getRemovedIds();

      try {
        await requestJson('/api/admin/update-paid', {
          method: 'POST',
          body: JSON.stringify({ paidIds, removedIds }),
        });

        allEntries = allEntries.map((e) => ({
          ...e,
          paid: paidIds.includes(e.id),
          removed: removedIds.includes(e.id),
        }));
        renderEntries(allEntries);
        setStatus(`Updated: ${paidIds.length} paid, ${removedIds.length} removed. Publish started.`, 'success');
      } catch (error) {
        setStatus(error.message, 'error');
      } finally {
        updateBtn.disabled = false;
      }
    }

    document.querySelectorAll('.filter-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderEntries(allEntries);
      });
    });

    loadBtn.addEventListener('click', loadEntries);
    updateBtn.addEventListener('click', updateStatus);

    if (savedToken) loadEntries();
  </script>
</body>
</html>
