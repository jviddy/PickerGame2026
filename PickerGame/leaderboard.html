<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard – Picker Game 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
  <style>
    /* ─── Tokens ──────────────────────────────────────────────────── */
    :root {
      --navy:       #1a3352;
      --navy-light: #2d5a8e;
      --gold:       #e86f2c;
      --gold-dark:  #c4561a;
      --green:      #22a861;
      --green-bg:   #e4f7eb;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --amber:      #c86b2c;
      --amber-bg:   #fff1dc;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --white:      #ffffff;
      --radius:     10px;
      --shadow:     0 1px 4px rgba(0,0,0,0.10);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.12);
    }

    /* ─── Base ──────────────────────────────────────────────────────*/
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 15px;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ─── Header ────────────────────────────────────────────────────*/
    header {
      background: linear-gradient(135deg, #1a3352 0%, #1e4070 100%);
      color: var(--white);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 10px rgba(11,79,47,0.24);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }
    .logo { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 0; }
    .logo span { color: var(--gold); }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--white); }

    /* ─── Main container ────────────────────────────────────────────*/
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ─── Page header ───────────────────────────────────────────────*/
    .page-header {
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .page-header p {
      color: var(--gray-600);
      margin: 0;
      font-size: 0.95rem;
    }

    .view-toggle {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin: -8px 0 14px;
    }
    .view-toggle-btn {
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--navy);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 7px 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .view-toggle-btn:hover {
      border-color: var(--navy-light);
      background: var(--green-bg);
    }

    /* ─── Leaderboard table ───────────────────────────────────────–*/
    .leaderboard {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .leaderboard-header {
      display: grid;
      grid-template-columns: 42px minmax(245px, 300px) minmax(0, 1fr) 58px 64px;
      gap: 8px;
      padding: 7px 12px;
      background: var(--navy);
      color: var(--white);
      font-weight: 800;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0;
      border-bottom: 2px solid var(--navy-light);
    }
    @media (max-width: 768px) {
      .leaderboard-header {
        grid-template-columns: 30px minmax(0, 1fr) 44px;
        gap: 6px;
        padding: 7px 10px;
      }
      .leaderboard-header > :nth-child(3),
      .leaderboard-header > :nth-child(4) { display: none; }
    }

    /* Picks filter input inside header */
    .picks-filter-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .picks-filter {
      display: block;
      width: 100%;
      padding: 3px 6px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      font-size: 0.66rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .picks-filter::placeholder { color: rgba(255,255,255,0.45); }
    .picks-filter:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.18); }
    @media (max-width: 768px) { .picks-filter-wrap { display: none; } }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 42px minmax(245px, 300px) minmax(0, 1fr) 58px 64px;
      column-gap: 8px;
      row-gap: 0;
      padding: 6px 12px;
      border-bottom: 1px solid var(--gray-200);
      align-items: center;
      transition: background 0.15s;
    }
    .leaderboard-row:hover { background: var(--gray-50); }
    .leaderboard-row.milestone-row {
      background: var(--gray-50);
    }
    .leaderboard-row.milestone-row:hover {
      background: var(--gray-100);
    }
    @media (max-width: 768px) {
      .leaderboard-row {
        grid-template-columns: 30px minmax(0, 1fr) 44px;
        column-gap: 6px;
        row-gap: 4px;
        padding: 7px 10px;
      }
      .team-count { display: none; }
    }

    /* ─── Rank badge ─────────────────────────────────────────────––*/
    .rank {
      grid-column: 1;
      grid-row: 1;
      font-weight: 800;
      font-size: 0.9rem;
      text-align: center;
      color: var(--navy);
    }
    .rank.first { color: var(--gold); font-size: 1rem; }
    .rank.second { color: #c0c0c0; font-size: 1rem; }
    .rank.third { color: #cd7f32; font-size: 1rem; }

    /* ─── Player info ─────────────────────────────────────────────––*/
    .player-info {
      display: flex;
      grid-column: 2;
      grid-row: 1;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }
    .player-name {
      font-weight: 800;
      font-size: 0.82rem;
      color: var(--navy);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .team-name {
      font-size: 0.68rem;
      color: var(--gray-600);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── Score display ──────────────────────────────────────────––*/
    .score-col {
      grid-column: 5;
      grid-row: 1;
      text-align: center;
      font-weight: 800;
      font-size: 0.92rem;
      color: var(--green);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .team-count {
      grid-column: 4;
      grid-row: 1;
      align-self: center;
      text-align: center;
      font-size: 0.7rem;
      color: var(--gray-600);
      font-weight: 600;
    }
    .selected-teams {
      display: flex;
      grid-column: 3;
      grid-row: 1;
      flex-wrap: nowrap;
      gap: 2px;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }
    .team-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      padding: 1px 5px 1px 2px;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--gray-50);
      color: var(--navy);
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1;
      flex: 0 0 auto;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .team-chip:hover {
      background: var(--green-bg);
      border-color: var(--green);
    }
    .team-chip img {
      width: 15px;
      height: 11px;
      border-radius: 2px;
      object-fit: cover;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .team-chip.eliminated {
      color: var(--gray-400);
      background: var(--gray-100);
    }
    .team-chip.eliminated img {
      filter: grayscale(1);
      opacity: 0.52;
    }
    .team-chip.eliminated:hover {
      background: var(--gray-200);
      border-color: var(--gray-400);
    }
    .team-points {
      color: var(--green);
      font-weight: 900;
    }

    .round-breakdown-inline {
      display: flex;
      grid-column: 3;
      grid-row: 1;
      flex-wrap: nowrap;
      gap: 2px;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }
    .round-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 1px 5px;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--gray-50);
      color: var(--navy);
      font-size: 0.62rem;
      font-weight: 800;
      line-height: 1;
      flex: 0 0 auto;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .round-chip:hover {
      background: var(--green-bg);
      border-color: var(--green);
    }
    .round-chip-score {
      color: var(--green);
      font-weight: 900;
    }
    @media (max-width: 768px) {
      .score-col { grid-column: 3; }
      .selected-teams { grid-column: 2 / 3; gap: 3px; }
      .round-breakdown-inline { grid-column: 2 / 3; gap: 3px; }
      .team-chip {
        padding: 0;
        border: none;
        background: transparent;
      }
      .team-chip img { width: 14px; height: 10px; }
      .team-chip span { display: none; }
    }

    /* compact chip code visibility */
    .team-chip .team-code { display: none; font-size: 0.62rem; }
    .team-chip .team-points { font-size: 0.62rem; }
    @media (min-width: 900px) {
      .team-chip { gap: 3px; }
      .team-chip .team-code { display: inline; }
      .team-chip .team-points { display: none; }
    }
    @media (min-width: 1000px) {
      .team-chip .team-points { display: inline; }
    }
    @media (max-width: 768px) {
      .leaderboard-row {
        row-gap: 4px;
      }
      .selected-teams,
      .round-breakdown-inline,
      .team-count { display: none; }
      .leaderboard.round-mode .leaderboard-row { row-gap: 4px; }
      .leaderboard.round-mode .round-breakdown-inline {
        display: flex;
        grid-column: 2 / 4;
        grid-row: 2;
        overflow-x: auto;
        padding-bottom: 1px;
      }
      .leaderboard.round-mode .round-chip {
        gap: 3px;
        font-size: 0.58rem;
        padding: 1px 5px;
      }
      .leaderboard.round-mode .score-col { grid-column: 3; }
      .team-name { display: none; }
    }

    /* ─── Points delta ───────────────────────────────────────────–*/
    .delta {
      font-size: 0.58rem;
      font-weight: 800;
      line-height: 1;
    }
    .delta.pos { color: var(--green); }
    .delta.neg { color: var(--red); }
    .delta.zero { color: var(--gray-400); }

    /* ─── Empty / Error states ───────────────────────────────────––*/
    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--gray-600);
    }
    .empty-state h2 { margin: 0 0 8px; color: var(--navy); }
    .empty-state p { margin: 0; }

    .error-msg {
      padding: 16px;
      background: var(--red-bg);
      border: 1.5px solid var(--red);
      border-radius: var(--radius);
      color: var(--red);
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ─── Modal overlay ──────────────────────────────────────────–*/
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      padding: 0;
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      background: var(--white);
      border-radius: 14px 14px 0 0;
    }
    .modal-header img {
      width: 40px;
      height: 27px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid var(--gray-200);
      flex-shrink: 0;
    }
    .modal-header-text { flex: 1; min-width: 0; }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--navy);
      margin: 0;
    }
    .modal-subtitle {
      font-size: 0.8rem;
      color: var(--gray-600);
      margin: 2px 0 0;
    }
    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      color: var(--gray-400);
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--gray-800); }
    .modal-body { padding: 20px; }

    /* Country modal stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-item {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
    }
    .stat-value.pos { color: var(--green); }
    .stat-value.neg { color: var(--red); }
    .stat-value.amber { color: var(--amber); }
    .stat-label {
      font-size: 0.68rem;
      color: var(--gray-600);
      margin-top: 3px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* Modal round scores */
    .modal-section-title {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 0 10px;
      padding-top: 12px;
      border-top: 1px solid var(--gray-200);
    }
    .modal-round-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .modal-round-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.82rem;
    }
    .modal-round-label { color: var(--gray-600); font-weight: 600; }
    .modal-round-score { font-weight: 800; color: var(--green); }
    .modal-round-score.neg { color: var(--red); }

    /* Round popup per-country list */
    .modal-country-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .modal-country-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .modal-country-item img {
      width: 24px;
      height: 16px;
      border-radius: 2px;
      object-fit: cover;
      border: 1px solid var(--gray-200);
      flex-shrink: 0;
    }
    .modal-country-name { flex: 1; font-weight: 700; color: var(--navy); }
    .modal-country-score { font-weight: 800; color: var(--green); }
    .modal-country-score.neg { color: var(--red); }
  </style>
  <script src="ticker.js" defer></script>
</head>
<body>

<header>
  <div class="header-inner">
    <h1 class="logo">Picker<span>Game</span> <span style="font-weight:400;color:rgba(255,255,255,0.6)">2026</span></h1>
    <nav>
      <a href="entry.html">Enter</a>
      <a href="entries.html">Entries</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="schedule.html">Matches</a>
      <a href="tables.html">Tables</a>
      <a href="countries.html">Countries</a>
      <a href="blog.html">Updates</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="page-header">
    <h1>⚽ Leaderboard</h1>
    <p>Current standings — calculated from live match results.</p>
  </div>

  <div class="view-toggle">
    <button class="view-toggle-btn" id="scoreModeToggleBtn" type="button">Round scores</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="leaderboard" id="leaderboard">
    <div class="empty-state">
      <h2>Loading leaderboard…</h2>
      <p>Calculating scores from match results.</p>
    </div>
  </div>
</div>

<!-- Country detail modal -->
<div class="modal-overlay hidden" id="countryModal">
  <div class="modal-box" id="countryModalBox"></div>
</div>

<!-- Round detail modal -->
<div class="modal-overlay hidden" id="roundModal">
  <div class="modal-box" id="roundModalBox"></div>
</div>

<script>
  /* ─── Config ──────────────────────────────────────────────── */
  const DATA_URLS = {
    teams:         './Data/teams.json',
    teamPoints:    './Data/teamPoints.json',
    entrantTotals: './Data/entrantTotals.json',
    matches:       './Data/matches.json',
    baseline:      './Data/pointsBaseline.json',
  };
  const ROUND_ORDER = ['GS1', 'GS2', 'GS3', 'R32', 'R16', 'QF', 'SF', 'TPP', 'F'];
  const ROUND_LABELS = {
    GS1: 'Group Stage 1', GS2: 'Group Stage 2', GS3: 'Group Stage 3',
    R32: 'Round of 32', R16: 'Round of 16', QF: 'Quarter-finals',
    SF: 'Semi-finals', TPP: 'Third Place', F: 'Final',
  };

  let allTeams = [];
  let teamPoints = [];
  let leaderboard = [];
  let allMatches = null;
  let pointsBaseline = {}; // entrantTeamName+entrantName → baselinePoints
  let scoreDisplayMode = 'countries';
  let picksFilter = '';

  /* ─── DOM ─────────────────────────────────────────────────── */
  const leaderboardEl    = document.getElementById('leaderboard');
  const scoreModeToggleBtn = document.getElementById('scoreModeToggleBtn');
  const errorMsg         = document.getElementById('errorMsg');
  const countryModal     = document.getElementById('countryModal');
  const countryModalBox  = document.getElementById('countryModalBox');
  const roundModal       = document.getElementById('roundModal');
  const roundModalBox    = document.getElementById('roundModalBox');

  /* ─── Data loading ────────────────────────────────────────── */
  async function loadAllData() {
    try {
      const [teamsRes, pointsRes, totalsRes] = await Promise.all([
        fetch(DATA_URLS.teams),
        fetch(DATA_URLS.teamPoints),
        fetch(DATA_URLS.entrantTotals),
      ]);

      const [teamsData, pointsData, totalsData] = await Promise.all([
        teamsRes.ok ? teamsRes.json() : Promise.reject(new Error(`teams: HTTP ${teamsRes.status}`)),
        pointsRes.ok ? pointsRes.json() : Promise.reject(new Error(`teamPoints: HTTP ${pointsRes.status}`)),
        totalsRes.ok ? totalsRes.json() : Promise.reject(new Error(`entrantTotals: HTTP ${totalsRes.status}`)),
      ]);

      // Load baseline for points-since-yesterday (non-fatal if missing)
      try {
        const baselineRes = await fetch(DATA_URLS.baseline);
        if (baselineRes.ok) {
          const baselineData = await baselineRes.json();
          baselineData.forEach(e => {
            pointsBaseline[e.entrantTeamName + '|' + e.entrantName] = e.totalPoints;
          });
        }
      } catch (_) {}

      allTeams   = teamsData;
      teamPoints = pointsData;
      leaderboard = totalsData.map(entry => {
        const teamScores = {};
        entry.teamBreakdown.forEach(team => { teamScores[team.countryName] = team.points; });
        return {
          entrantName:   entry.entrantName,
          teamName:      entry.entrantTeamName,
          totalScore:    entry.totalPoints,
          teamsRemaining: entry.teamsRemaining,
          selectedTeams: entry.selectedTeams || entry.teamBreakdown.map(t => t.countryName),
          teamScores,
          roundScores:   entry.byRound || {},
        };
      });

      return true;
    } catch (e) {
      showError(`Failed to load data: ${e.message}`);
      return false;
    }
  }

  async function loadMatches() {
    if (allMatches) return allMatches;
    const res = await fetch(DATA_URLS.matches);
    if (!res.ok) throw new Error(`matches: HTTP ${res.status}`);
    allMatches = await res.json();
    return allMatches;
  }

  /* ─── Helpers ─────────────────────────────────────────────── */
  function getTeamByCountryName(countryName) {
    return allTeams.find(t => t.countryName === countryName);
  }

  function isTeamEliminated(countryName) {
    const t = teamPoints.find(t => t.countryName === countryName);
    return t ? t.inCompetition === false : false;
  }

  function getTeamAbbreviation(countryName) {
    const overrides = {
      'United States': 'USA', 'South Africa': 'RSA', 'South Korea': 'KOR',
      'Czech Republic': 'CZE', 'New Zealand': 'NZL', 'Saudi Arabia': 'KSA',
      'Ivory Coast': 'CIV', 'Cape Verde': 'CPV', 'Netherlands': 'NED',
    };
    return overrides[countryName] || countryName.replace(/\[.*?\]/g, '').replace(/[^A-Za-z]/g, '').slice(0, 3).toUpperCase();
  }

  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return String(text ?? '').replace(/[&<>"']/g, m => map[m]);
  }

  /* ─── Points delta ────────────────────────────────────────── */
  function getDeltaHtml(entry) {
    const key = entry.teamName + '|' + entry.entrantName;
    if (!(key in pointsBaseline)) return '';
    const delta = entry.totalScore - pointsBaseline[key];
    if (delta === 0) return '<span class="delta zero">—</span>';
    return delta > 0
      ? `<span class="delta pos">▲${delta}</span>`
      : `<span class="delta neg">▼${Math.abs(delta)}</span>`;
  }

  /* ─── Row fragment builders ───────────────────────────────── */
  function getSelectedTeamsHtml(selectedTeams, teamScores) {
    return `
      <div class="selected-teams">
        ${selectedTeams.map(countryName => {
          const team = getTeamByCountryName(countryName);
          const eliminated = isTeamEliminated(countryName);
          const flagUrl = team ? team.flagUrl : '';
          const points = teamScores[countryName] || 0;
          return `
            <span class="team-chip${eliminated ? ' eliminated' : ''}"
                  title="${escapeHtml(countryName)}"
                  data-country="${escapeHtml(countryName)}">
              <img src="${escapeHtml(flagUrl)}" alt="${escapeHtml(countryName)}" loading="lazy" />
              <span class="team-code">${getTeamAbbreviation(countryName)}</span>
              <span class="team-points">${points}</span>
            </span>
          `;
        }).join('')}
      </div>
    `;
  }

  function getEntryRoundScoresHtml(roundScores, entryIdx) {
    return `
      <div class="round-breakdown-inline">
        ${ROUND_ORDER.map(round => `
          <span class="round-chip"
                title="${ROUND_LABELS[round] || round}"
                data-round="${round}"
                data-entry-idx="${entryIdx}">
            <span>${round}</span>
            <span class="round-chip-score">${roundScores[round] || 0}</span>
          </span>
        `).join('')}
      </div>
    `;
  }

  /* ─── Rendering ───────────────────────────────────────────– */
  function renderLeaderboard() {
    if (leaderboard.length === 0) {
      leaderboardEl.innerHTML = `
        <div class="empty-state">
          <h2>No entries yet</h2>
          <p><a href="entry.html">Enter the game</a> to get on the leaderboard.</p>
        </div>
      `;
      return;
    }

    // Apply picks filter
    let filtered = leaderboard;
    if (picksFilter) {
      const q = picksFilter.toLowerCase();
      filtered = leaderboard.filter(entry =>
        entry.selectedTeams.some(name =>
          name.toLowerCase().includes(q) ||
          getTeamAbbreviation(name).toLowerCase().startsWith(q)
        )
      );
    }

    const picksLabel = scoreDisplayMode === 'countries' ? 'Picks' : 'Rounds';

    let html = `
      <div class="leaderboard-header">
        <div>Rank</div>
        <div>Team</div>
        <div class="picks-filter-wrap">
          <span>${picksLabel}</span>
          <input class="picks-filter" id="picksFilterInput"
                 placeholder="filter by country…"
                 value="${escapeHtml(picksFilter)}" />
        </div>
        <div>Left</div>
        <div>Score</div>
      </div>
    `;

    filtered.forEach((entry, idx) => {
      const originalRank = leaderboard.indexOf(entry) + 1;
      let rankClass = '', rankEmoji = originalRank;
      if (originalRank === 1) { rankClass = 'first';  rankEmoji = '🥇'; }
      else if (originalRank === 2) { rankClass = 'second'; rankEmoji = '🥈'; }
      else if (originalRank === 3) { rankClass = 'third';  rankEmoji = '🥉'; }

      const entryIdx = leaderboard.indexOf(entry);

      html += `
        <div class="leaderboard-row${originalRank % 10 === 0 ? ' milestone-row' : ''}">
          <div class="rank ${rankClass}">${rankEmoji}</div>
          <div class="player-info">
            <div class="player-name">${escapeHtml(entry.teamName)}</div>
            <div class="team-name">${escapeHtml(entry.entrantName)}</div>
          </div>
          ${scoreDisplayMode === 'countries'
            ? getSelectedTeamsHtml(entry.selectedTeams, entry.teamScores)
            : getEntryRoundScoresHtml(entry.roundScores, entryIdx)}
          <div class="team-count">${entry.teamsRemaining}/${entry.selectedTeams.length}</div>
          <div class="score-col">
            <span>${entry.totalScore}</span>
            ${getDeltaHtml(entry)}
          </div>
        </div>
      `;
    });

    if (filtered.length === 0) {
      html += `
        <div class="empty-state">
          <h2>No matches</h2>
          <p>No entries include "${escapeHtml(picksFilter)}".</p>
        </div>
      `;
    }

    leaderboardEl.innerHTML = html;
    leaderboardEl.classList.toggle('round-mode', scoreDisplayMode === 'rounds');

    // Wire up picks filter input
    const filterInput = document.getElementById('picksFilterInput');
    if (filterInput) {
      filterInput.addEventListener('input', e => {
        picksFilter = e.target.value.trim();
        renderLeaderboard();
      });
      // Restore focus if filtering
      if (picksFilter) filterInput.focus();
    }

    // Event delegation for chip clicks
    leaderboardEl.addEventListener('click', handleChipClick, { once: true });
    // Re-attach each render via delegation on the element itself
  }

  /* ─── Chip click event delegation ────────────────────────── */
  leaderboardEl.addEventListener('click', handleChipClick);

  function handleChipClick(e) {
    const countryChip = e.target.closest('.team-chip[data-country]');
    if (countryChip) {
      e.stopPropagation();
      showCountryModal(countryChip.dataset.country);
      return;
    }
    const roundChip = e.target.closest('.round-chip[data-round]');
    if (roundChip) {
      e.stopPropagation();
      showRoundModal(parseInt(roundChip.dataset.entryIdx, 10), roundChip.dataset.round);
    }
  }

  /* ─── Country modal ───────────────────────────────────────── */
  async function showCountryModal(countryName) {
    const team = allTeams.find(t => t.countryName === countryName);
    if (!team) return;

    // Compute match stats from scoresByRound
    let played = 0, wins = 0, draws = 0, losses = 0, goalsFor = 0, goalsAgainst = 0;
    (team.scoresByRound || []).forEach(round => {
      (round.matches || []).forEach(m => {
        played++;
        goalsFor    += m.goalsFor    || 0;
        goalsAgainst += m.goalsAgainst || 0;
        if (m.result === 'win')      wins++;
        else if (m.result === 'draw') draws++;
        else if (m.result === 'loss') losses++;
      });
    });

    // Get card stats from matches.json (lazy loaded)
    let yellowCards = 0, redCards = 0;
    try {
      const matches = await loadMatches();
      matches.filter(m => m.played && m.result).forEach(m => {
        if (m.homeTeam === team.groupId) {
          yellowCards += m.result.homeYellow || 0;
          redCards    += m.result.homeRed    || 0;
        } else if (m.awayTeam === team.groupId) {
          yellowCards += m.result.awayYellow || 0;
          redCards    += m.result.awayRed    || 0;
        }
      });
    } catch (_) { /* cards unavailable */ }

    // Round breakdown (PickerGame points)
    const roundRows = (team.scoresByRound || [])
      .filter(r => r.total !== 0)
      .map(r => {
        const neg = r.total < 0;
        return `
          <div class="modal-round-item">
            <span class="modal-round-label">${ROUND_LABELS[r.roundCode] || r.roundCode}</span>
            <span class="modal-round-score${neg ? ' neg' : ''}">${r.total > 0 ? '+' : ''}${r.total}</span>
          </div>
        `;
      }).join('');

    countryModalBox.innerHTML = `
      <div class="modal-header">
        <img src="${escapeHtml(team.flagUrl)}" alt="${escapeHtml(countryName)}" />
        <div class="modal-header-text">
          <div class="modal-title">${escapeHtml(countryName)}</div>
          <div class="modal-subtitle">Group ${escapeHtml(team.group)} · ${team.totalPoints} pts · Cost £${team.cost}m</div>
        </div>
        <button class="modal-close" id="closeCountryModal" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-value">${played}</div><div class="stat-label">Played</div></div>
          <div class="stat-item"><div class="stat-value pos">${wins}</div><div class="stat-label">Wins</div></div>
          <div class="stat-item"><div class="stat-value">${draws}</div><div class="stat-label">Draws</div></div>
          <div class="stat-item"><div class="stat-value neg">${losses}</div><div class="stat-label">Losses</div></div>
          <div class="stat-item"><div class="stat-value pos">${goalsFor}</div><div class="stat-label">Goals For</div></div>
          <div class="stat-item"><div class="stat-value neg">${goalsAgainst}</div><div class="stat-label">Goals Ag.</div></div>
          <div class="stat-item"><div class="stat-value amber">${yellowCards}</div><div class="stat-label">Yellow</div></div>
          <div class="stat-item"><div class="stat-value neg">${redCards}</div><div class="stat-label">Red</div></div>
          <div class="stat-item"><div class="stat-value pos">${team.totalPoints}</div><div class="stat-label">PG Pts</div></div>
        </div>
        ${roundRows ? `
          <div class="modal-section-title">PickerGame points by round</div>
          <div class="modal-round-list">${roundRows}</div>
        ` : ''}
      </div>
    `;

    countryModal.classList.remove('hidden');
    document.getElementById('closeCountryModal').addEventListener('click', closeCountryModal);
  }

  function closeCountryModal() {
    countryModal.classList.add('hidden');
  }

  countryModal.addEventListener('click', e => {
    if (e.target === countryModal) closeCountryModal();
  });

  /* ─── Round modal ─────────────────────────────────────────── */
  function showRoundModal(entryIdx, roundCode) {
    const entry = leaderboard[entryIdx];
    if (!entry) return;

    const roundLabel = ROUND_LABELS[roundCode] || roundCode;

    const countryRows = entry.selectedTeams.map(countryName => {
      const team = allTeams.find(t => t.countryName === countryName);
      const roundData = team?.scoresByRound?.find(r => r.roundCode === roundCode);
      const pts = roundData?.total ?? null;
      const ptsDisplay = pts === null ? '—' : (pts > 0 ? `+${pts}` : String(pts));
      const flagUrl = team ? team.flagUrl : '';
      const neg = pts !== null && pts < 0;
      return `
        <div class="modal-country-item">
          <img src="${escapeHtml(flagUrl)}" alt="${escapeHtml(countryName)}" />
          <span class="modal-country-name">${escapeHtml(countryName)}</span>
          <span class="modal-country-score${neg ? ' neg' : ''}">${ptsDisplay}</span>
        </div>
      `;
    }).join('');

    roundModalBox.innerHTML = `
      <div class="modal-header">
        <div class="modal-header-text">
          <div class="modal-title">${escapeHtml(roundLabel)}</div>
          <div class="modal-subtitle">${escapeHtml(entry.teamName)} — ${escapeHtml(entry.entrantName)}</div>
        </div>
        <button class="modal-close" id="closeRoundModal" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-country-list">${countryRows}</div>
      </div>
    `;

    roundModal.classList.remove('hidden');
    document.getElementById('closeRoundModal').addEventListener('click', closeRoundModal);
  }

  function closeRoundModal() {
    roundModal.classList.add('hidden');
  }

  roundModal.addEventListener('click', e => {
    if (e.target === roundModal) closeRoundModal();
  });

  /* ─── Utilities ───────────────────────────────────────────– */
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function updateScoreModeButton() {
    scoreModeToggleBtn.textContent = scoreDisplayMode === 'countries' ? 'Round scores' : 'Country scores';
    leaderboardEl.classList.toggle('round-mode', scoreDisplayMode === 'rounds');
  }

  scoreModeToggleBtn.addEventListener('click', () => {
    scoreDisplayMode = scoreDisplayMode === 'countries' ? 'rounds' : 'countries';
    updateScoreModeButton();
    renderLeaderboard();
  });

  /* ─── Keyboard close ──────────────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeCountryModal(); closeRoundModal(); }
  });

  /* ─── Init ────────────────────────────────────────────────– */
  async function init() {
    updateScoreModeButton();
    if (await loadAllData()) renderLeaderboard();
  }

  init();
</script>
</body>
</html>
