<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard – Picker Game 2026</title>
  <script>
    // Redirect to entries list during entry phase
    if (Date.now() < new Date('2026-06-11T19:00:00Z').getTime()) {
      location.replace('entries.html');
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
  <style>
    /* ─── Tokens ──────────────────────────────────────────────────── */
    :root {
      --navy:       #1a3352;
      --navy-light: #2d5a8e;
      --gold:       #e86f2c;
      --gold-dark:  #c4561a;
      --green:      #22a861;
      --green-bg:   #e4f7eb;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --amber:      #c86b2c;
      --amber-bg:   #fff1dc;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --white:      #ffffff;
      --radius:     10px;
      --shadow:     0 1px 4px rgba(0,0,0,0.10);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.12);
    }

    /* ─── Base ──────────────────────────────────────────────────────*/
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 15px;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ─── Header ────────────────────────────────────────────────────*/
    header {
      background: linear-gradient(135deg, #1a3352 0%, #1e4070 100%);
      color: var(--white);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 10px rgba(11,79,47,0.24);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }
    .logo { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 0; }
    .logo span { color: var(--gold); }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--white); }
    .nav-select {
      display: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .nav-select option { color: #000; }
    @media (max-width: 768px) {
      nav { display: none; }
      .nav-select { display: block; }
    }

    /* ─── Main container ────────────────────────────────────────────*/
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ─── Page header ───────────────────────────────────────────────*/
    .page-header {
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .page-header p {
      color: var(--gray-600);
      margin: 0;
      font-size: 0.95rem;
    }

    .view-toggle {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin: -8px 0 14px;
    }
    .view-toggle-btn {
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--navy);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 7px 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .view-toggle-btn:hover {
      border-color: var(--navy-light);
      background: var(--green-bg);
    }
    .view-mode-select {
      display: none;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      background: var(--white);
      color: var(--navy);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 7px 10px;
      cursor: pointer;
      width: 100%;
    }
    @media (max-width: 768px) {
      .view-toggle-btn { display: none; }
      .view-mode-select { display: block; }
      .view-toggle { width: 100%; margin: 0; justify-content: flex-start; }
    }

    /* ─── Leaderboard table ───────────────────────────────────────–*/
    .leaderboard {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
    }

    #lb-sticky-header {
      position: sticky;
      top: calc(58px + var(--controls-height, 0px));
      z-index: 10;
    }
    .leaderboard-header {
      border-radius: var(--radius) var(--radius) 0 0;
      display: grid;
      grid-template-columns: 42px minmax(245px, 300px) minmax(0, 1fr) 58px 64px;
      gap: 8px;
      padding: 7px 12px;
      background: var(--navy);
      color: var(--white);
      font-weight: 800;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0;
      border-bottom: 2px solid var(--navy-light);
    }
    @media (max-width: 768px) {
      .leaderboard-header {
        grid-template-columns: 30px minmax(0, 1fr) 44px;
        gap: 6px;
        padding: 7px 10px;
      }
      .leaderboard-header > :nth-child(3),
      .leaderboard-header > :nth-child(4) { display: none; }
    }

    /* Picks filter input inside header */
    .picks-filter-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .picks-filter {
      display: block;
      width: 100%;
      padding: 3px 6px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      font-size: 0.66rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .picks-filter::placeholder { color: rgba(255,255,255,0.45); }
    .picks-filter:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.18); }
    @media (max-width: 768px) { .picks-filter-wrap { display: none; } }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 42px minmax(245px, 300px) minmax(0, 1fr) 58px 64px;
      column-gap: 8px;
      row-gap: 0;
      padding: 6px 12px;
      border-bottom: 1px solid var(--gray-200);
      align-items: center;
      transition: background 0.15s;
    }
    .leaderboard-row:hover { background: var(--gray-50); }
    .leaderboard-row.milestone-row {
      background: var(--gray-50);
    }
    .leaderboard-row.milestone-row:hover {
      background: var(--gray-100);
    }
    @media (max-width: 768px) {
      .leaderboard-row {
        grid-template-columns: 30px minmax(0, 1fr) 44px;
        column-gap: 6px;
        row-gap: 4px;
        padding: 7px 10px;
      }
      .team-count { display: none; }
    }

    /* ─── Rank badge ─────────────────────────────────────────────––*/
    .rank {
      grid-column: 1;
      grid-row: 1;
      font-weight: 800;
      font-size: 0.9rem;
      text-align: center;
      color: var(--navy);
    }
    .rank.first { color: var(--gold); font-size: 1rem; }
    .rank.second { color: #c0c0c0; font-size: 1rem; }
    .rank.third { color: #cd7f32; font-size: 1rem; }

    /* ─── Player info ─────────────────────────────────────────────––*/
    .player-info {
      display: flex;
      grid-column: 2;
      grid-row: 1;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }
    .player-name {
      font-weight: 800;
      font-size: 0.82rem;
      color: var(--navy);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .team-name {
      font-size: 0.68rem;
      color: var(--gray-600);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── Score display ──────────────────────────────────────────––*/
    .score-col {
      grid-column: 5;
      grid-row: 1;
      text-align: center;
      font-weight: 800;
      font-size: 0.92rem;
      color: var(--green);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .team-count {
      grid-column: 4;
      grid-row: 1;
      align-self: center;
      text-align: center;
      font-size: 0.7rem;
      color: var(--gray-600);
      font-weight: 600;
    }
    .selected-teams {
      display: flex;
      grid-column: 3;
      grid-row: 1;
      flex-wrap: nowrap;
      gap: 2px;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }
    .team-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      padding: 1px 5px 1px 2px;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--gray-50);
      color: var(--navy);
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1;
      flex: 0 0 auto;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .team-chip:hover {
      background: var(--green-bg);
      border-color: var(--green);
    }
    .team-chip img {
      width: 15px;
      height: 11px;
      border-radius: 2px;
      object-fit: cover;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .team-chip.eliminated {
      color: var(--gray-400);
      background: var(--gray-100);
    }
    .team-chip.eliminated img {
      filter: grayscale(1);
      opacity: 0.52;
    }
    .team-chip.eliminated:hover {
      background: var(--gray-200);
      border-color: var(--gray-400);
    }
    .team-points {
      color: var(--green);
      font-weight: 900;
    }

    .round-breakdown-inline {
      display: flex;
      grid-column: 3;
      grid-row: 1;
      flex-wrap: nowrap;
      gap: 2px;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }
    .round-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 1px 5px;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--gray-50);
      color: var(--navy);
      font-size: 0.62rem;
      font-weight: 800;
      line-height: 1;
      flex: 0 0 auto;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .round-chip:hover {
      background: var(--green-bg);
      border-color: var(--green);
    }
    .round-chip-score {
      color: var(--green);
      font-weight: 900;
    }
    @media (max-width: 768px) {
      .score-col { grid-column: 3; }
      .selected-teams { grid-column: 2 / 3; gap: 3px; }
      .round-breakdown-inline { grid-column: 2 / 3; gap: 3px; }
      .team-chip {
        padding: 0;
        border: none;
        background: transparent;
      }
      .team-chip img { width: 14px; height: 10px; }
      .team-chip span { display: none; }
    }

    /* compact chip code visibility */
    .team-chip .team-code { display: none; font-size: 0.62rem; }
    .team-chip .team-points { font-size: 0.62rem; }
    @media (min-width: 900px) {
      .team-chip { gap: 3px; }
      .team-chip .team-code { display: inline; }
      .team-chip .team-points { display: none; }
    }
    @media (min-width: 1000px) {
      .team-chip .team-points { display: inline; }
    }
    @media (max-width: 768px) {
      .leaderboard-row {
        row-gap: 4px;
      }
      .selected-teams,
      .round-breakdown-inline,
      .team-count { display: none; }

      /* Countries mode: show chips in row 2, hide entrant name */
      .leaderboard.countries-mode .leaderboard-row { row-gap: 4px; align-items: start; }
      .leaderboard.countries-mode .rank { padding-top: 2px; }
      .leaderboard.countries-mode .score-col { padding-top: 2px; }
      .leaderboard.countries-mode .selected-teams {
        display: flex;
        grid-column: 2 / 4;
        grid-row: 2;
        overflow-x: auto;
        padding-bottom: 2px;
        gap: 2px;
        min-height: 20px;
        align-items: center;
      }
      .leaderboard.countries-mode .team-chip {
        padding: 1px 3px 1px 2px;
        border: 1px solid var(--gray-200);
        background: var(--gray-50);
      }
      .leaderboard.countries-mode .team-chip img { width: 12px; height: 9px; }
      .leaderboard.countries-mode .team-chip .team-points {
        display: inline;
        font-size: 0.55rem;
      }
      /* Round mode: show round chips in row 2 */
      .leaderboard.round-mode .leaderboard-row { row-gap: 4px; align-items: start; }
      .leaderboard.round-mode .rank { padding-top: 2px; }
      .leaderboard.round-mode .score-col { padding-top: 2px; }
      .leaderboard.round-mode .round-breakdown-inline {
        display: flex;
        grid-column: 2 / 4;
        grid-row: 2;
        overflow-x: auto;
        padding-bottom: 1px;
        min-height: 20px;
        align-items: center;
      }
      .leaderboard.round-mode .round-chip {
        gap: 3px;
        font-size: 0.58rem;
        padding: 1px 5px;
      }
      .leaderboard.round-mode .score-col { grid-column: 3; }
    }

    /* ─── Points delta ───────────────────────────────────────────–*/
    .delta {
      font-size: 0.58rem;
      font-weight: 800;
      line-height: 1;
    }
    .delta.pos { color: var(--green); }
    .delta.neg { color: var(--red); }
    .delta.zero { color: var(--gray-400); }

    /* ─── Empty / Error states ───────────────────────────────────––*/
    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--gray-600);
    }
    .empty-state h2 { margin: 0 0 8px; color: var(--navy); }
    .empty-state p { margin: 0; }

    .error-msg {
      padding: 16px;
      background: var(--red-bg);
      border: 1.5px solid var(--red);
      border-radius: var(--radius);
      color: var(--red);
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ─── Inline row expansion ───────────────────────────────────*/
    .leaderboard-row.expanded { background: var(--green-bg); }
    .leaderboard-row.expanded:hover { background: var(--green-bg); }

    .row-expansion {
      grid-column: 1 / -1;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
      padding: 10px 12px;
      animation: expand-in 0.15s ease;
    }
    @keyframes expand-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .expansion-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .expansion-header img {
      width: 28px; height: 19px;
      border-radius: 3px;
      object-fit: cover;
      border: 1px solid var(--gray-200);
      flex-shrink: 0;
    }
    .expansion-title {
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--navy);
    }
    .expansion-subtitle {
      font-size: 0.72rem;
      color: var(--gray-600);
      margin-left: auto;
    }
    .expansion-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-400);
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .expansion-close:hover { color: var(--gray-800); }
    .expansion-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }
    .expansion-stat {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 5px 8px;
      text-align: center;
      min-width: 40px;
    }
    .expansion-stat-val {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
    }
    .expansion-stat-val.pos { color: var(--green); }
    .expansion-stat-val.neg { color: var(--red); }
    .expansion-stat-val.amber { color: var(--amber); }
    .expansion-stat-lbl {
      font-size: 0.6rem;
      color: var(--gray-600);
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .expansion-rounds {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .expansion-round-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.75rem;
    }
    .expansion-round-lbl { color: var(--gray-600); font-weight: 600; }
    .expansion-round-score { font-weight: 800; color: var(--green); }
    .expansion-round-score.neg { color: var(--red); }
    .expansion-section-lbl {
      font-size: 0.6rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gray-400);
      margin: 8px 0 4px;
    }
    .expansion-section-lbl:first-child { margin-top: 0; }
    .expansion-divider {
      border: none;
      border-top: 1px solid var(--gray-200);
      margin: 8px 0;
    }
    .expansion-country-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .expansion-country-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px 3px 4px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      font-size: 0.75rem;
    }
    .expansion-country-chip img {
      width: 20px; height: 13px;
      border-radius: 2px;
      object-fit: cover;
      border: 1px solid var(--gray-200);
    }
    .expansion-country-chip .c-name { color: var(--navy); font-weight: 700; }
    .expansion-country-chip .c-score { color: var(--green); font-weight: 800; }
    .expansion-country-chip .c-score.neg { color: var(--red); }

    /* ─── Find bar ───────────────────────────────────────────────*/
    .find-bar {
      background: #f8faff;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .find-icon { color: var(--gray-600); font-size: 0.9rem; flex-shrink: 0; }
    .find-input {
      flex: 1;
      min-width: 180px;
      padding: 7px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      font-size: 0.85rem;
      outline: none;
      color: var(--gray-800);
      background: var(--white);
    }
    .find-input:focus { border-color: var(--navy-light); }
    .find-input::placeholder { color: var(--gray-400); }
    .find-status { font-size: 0.78rem; font-weight: 700; color: var(--gray-600); white-space: nowrap; }
    .find-status.found { color: var(--green); }
    .find-status.notfound { color: var(--red); }
    .find-clear {
      background: none; border: none; cursor: pointer;
      color: var(--gray-400); font-size: 1rem; padding: 2px 4px; line-height: 1; border-radius: 3px;
    }
    .find-clear:hover { color: var(--gray-800); }
    .find-private { font-size: 0.7rem; color: var(--gray-400); white-space: nowrap; }

    /* ─── Star button ────────────────────────────────────────────*/
    .star-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.85rem; padding: 0; opacity: 0.2;
      line-height: 1; transition: opacity 0.12s, transform 0.1s;
    }
    .star-btn:hover { opacity: 0.7; transform: scale(1.2); }
    .star-btn.pinned { opacity: 1; }

    /* ─── Row highlight states ───────────────────────────────────*/
    .leaderboard-row.row-highlighted { background: #fffbeb !important; box-shadow: inset 3px 0 0 #f59e0b; }
    .leaderboard-row.row-pinned { background: #f0f9ff !important; box-shadow: inset 3px 0 0 #3b82f6; }
    .leaderboard-row.row-highlighted.row-pinned { background: #fffbeb !important; box-shadow: inset 3px 0 0 #f59e0b; }
    .leaderboard-row.row-highlighted:hover,
    .leaderboard-row.row-pinned:hover { filter: brightness(0.97); }

    /* ─── Controls row (toggle + stats) ────────────────────────*/
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 0;
    }
    @media (min-width: 769px) {
      .controls-row {
        position: sticky;
        top: 58px;
        z-index: 9;
        background: var(--gray-100);
        padding: 8px 0;
        border-bottom: 1px solid var(--gray-200);
        margin-bottom: 0;
      }
    }

    /* ─── Tournament stats bar ──────────────────────────────────*/
    #tournamentStatsBar {
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    .stats-bar-header {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--gray-500);
      margin-bottom: 2px;
    }
    .stats-row {
      display: flex;
      gap: 8px;
    }
    .stats-pill {
      background: var(--gray-100);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--gray-600);
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .stats-pill strong { color: var(--gray-900); font-weight: 700; }
    @media (min-width: 769px) {
      #tournamentStatsBar {
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        background: var(--white);
        padding: 8px 14px;
      }
    }
    @media (max-width: 768px) {
      .controls-row { flex-direction: column; align-items: flex-start; }
      #tournamentStatsBar { width: 100%; }
    }

    /* ─── My picks mini panel ────────────────────────────────────*/
    .my-picks-panel {
      background: var(--white);
      border: 1.5px solid #3b82f6;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .my-picks-header {
      padding: 7px 12px;
      background: #3b82f6;
      color: var(--white);
      font-weight: 800;
      font-size: 0.78rem;
      display: flex;
      justify-content: space-between;

    /* ─── Scroll nav buttons ────────────────────────────────────*/

      right: 16px;
      display: flex;
      flex-direction: column;

      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.8rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
      transition: background 0.15s, opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .scroll-nav-btn:hover { background: var(--navy-light); }
    .scroll-nav-btn.hidden { opacity: 0; pointer-events: none; transform: translateY(4px); }
  </style>
  <script src="ticker.js" defer></script>
  <script src="/nav-phase.js"></script>
</head>
<body>

  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="controls-row">

        <option value="rounds">Round scores</option>

  </div>

  <!-- Find by email -->
  <div class="find-bar">

           placeholder="Search by name, team or email…"

    </div>

<div class="scroll-nav" aria-label="Page navigation">

  <button class="scroll-nav-btn" id="scrollBotBtn" type="button">↓ Bottom</button>
</div>


<script>
  /* ─── Config ──────────────────────────────────────────────── */
  const DATA_URLS = {
    teams:           './Data/teams.json',
    teamPoints:      './Data/teamPoints.json',
    entrantTotals:   './Data/entrantTotals.json',
    matches:         './Data/matches.json',
    baseline:        './Data/pointsBaseline.json',
    tournamentStats: './Data/tournamentStats.json',
  };
  const ROUND_ORDER = ['GS1', 'GS2', 'GS3', 'R32', 'R16', 'QF', 'SF', 'TPP', 'F'];
  const ROUND_LABELS = {
    GS1: 'Group Stage 1', GS2: 'Group Stage 2', GS3: 'Group Stage 3',
    R32: 'Round of 32', R16: 'Round of 16', QF: 'Quarter-finals',
    SF: 'Semi-finals', TPP: 'Third Place', F: 'Final',
  };

  let allTeams = [];
  let teamPoints = [];
  let leaderboard = [];
  let allMatches = null;
  let pointsBaseline = {};
  let tournamentStats = null;
  let scoreDisplayMode = 'countries';
  let picksFilter = '';
  let expandedChipEl = null;
  let expandedExpansionEl = null;

  // Find / pin state
  let emailHashes = {};
  let emailMatchTeams = new Set();
  let searchFilter = '';
  let pinnedTeams = new Set(JSON.parse(localStorage.getItem('pg2026_pins') || '[]'));

  /* ─── DOM ─────────────────────────────────────────────────── */
  const leaderboardEl      = document.getElementById('leaderboard');
  const scoreModeToggleBtn = document.getElementById('scoreModeToggleBtn');
  const scoreModeSelect    = document.getElementById('scoreModeSelect');
  const errorMsg           = document.getElementById('errorMsg');
  const emailInput         = document.getElementById('emailFindInput');
  const findStatus         = document.getElementById('findStatus');
  const findClear          = document.getElementById('findClear');
  const myPicksPanel       = document.getElementById('myPicksPanel');
  const myPicksRows        = document.getElementById('myPicksRows');

  /* ─── Data loading ────────────────────────────────────────── */
  async function loadAllData() {
    try {
      const [teamsRes, pointsRes, totalsRes, matchesRes] = await Promise.all([
        fetch(DATA_URLS.teams),
        fetch(DATA_URLS.teamPoints),
        fetch(DATA_URLS.entrantTotals),
        fetch(DATA_URLS.matches),
      ]);

      const [teamsData, pointsData, totalsData] = await Promise.all([
        teamsRes.ok  ? teamsRes.json()  : Promise.reject(new Error(`teams: HTTP ${teamsRes.status}`)),
        pointsRes.ok ? pointsRes.json() : Promise.reject(new Error(`teamPoints: HTTP ${pointsRes.status}`)),
        totalsRes.ok ? totalsRes.json() : Promise.reject(new Error(`entrantTotals: HTTP ${totalsRes.status}`)),
      ]);

      allMatches = matchesRes.ok ? await matchesRes.json() : null;

      try {
        const baselineRes = await fetch(DATA_URLS.baseline);
        if (baselineRes.ok) {
          const baselineData = await baselineRes.json();
          baselineData.forEach(e => {
            pointsBaseline[e.entrantTeamName + '|' + e.entrantName] = e.totalPoints;
          });
        }
      } catch (_) {}

      try {
        const statsRes = await fetch(DATA_URLS.tournamentStats);
        if (statsRes.ok) tournamentStats = await statsRes.json();
      } catch (_) {}

      allTeams   = teamsData;
      teamPoints = pointsData;
      leaderboard = totalsData.map(entry => {
        const teamScores = {};
        entry.teamBreakdown.forEach(team => { teamScores[team.countryName] = team.points; });
        return {
          entrantName:    entry.entrantName,
          teamName:       entry.entrantTeamName,
          totalScore:     entry.totalPoints,
          teamsRemaining: entry.teamsRemaining,
          selectedTeams:  entry.selectedTeams || entry.teamBreakdown.map(t => t.countryName),
          teamScores,
          roundScores:    entry.byRound || {},
          tieBreakers:    entry.tieBreakers || [],
        };
      });

      return true;
    } catch (e) {
      showError(`Failed to load data: ${e.message}`);
      return false;
    }
  }

  /* ─── Helpers ─────────────────────────────────────────────── */
  function getTeamByCountryName(countryName) {
    return allTeams.find(t => t.countryName === countryName);
  }

  function isTeamEliminated(countryName) {
    const t = teamPoints.find(t => t.countryName === countryName);
    return t ? t.inCompetition === false : false;
  }

  function getTeamAbbreviation(countryName) {
    const overrides = {
      'United States': 'USA', 'South Africa': 'RSA', 'South Korea': 'KOR',
      'Czech Republic': 'CZE', 'New Zealand': 'NZL', 'Saudi Arabia': 'KSA',
      'Ivory Coast': 'CIV', 'Cape Verde': 'CPV', 'Netherlands': 'NED',
    };
    return overrides[countryName] || countryName.replace(/\[.*?\]/g, '').replace(/[^A-Za-z]/g, '').slice(0, 3).toUpperCase();
  }

  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return String(text ?? '').replace(/[&<>"']/g, m => map[m]);
  }

  /* ─── Points delta ────────────────────────────────────────── */
  function getDeltaHtml(entry) {
    const key = entry.teamName + '|' + entry.entrantName;
    if (!(key in pointsBaseline)) return '';
    const delta = entry.totalScore - pointsBaseline[key];
    if (delta === 0) return '<span class="delta zero">—</span>';
    return delta > 0
      ? `<span class="delta pos">▲${delta}</span>`
      : `<span class="delta neg">▼${Math.abs(delta)}</span>`;
  }

  /* ─── Row fragment builders ───────────────────────────────── */
  function getSelectedTeamsHtml(selectedTeams, teamScores) {
    const sorted = [...selectedTeams].sort((a, b) => {
      const diff = (teamScores[b] || 0) - (teamScores[a] || 0);
      return diff !== 0 ? diff : a.localeCompare(b);
    });
    return `
      <div class="selected-teams">
        ${sorted.map(countryName => {
          const team = getTeamByCountryName(countryName);
          const eliminated = isTeamEliminated(countryName);
          const flagUrl = team ? team.flagUrl : '';
          const points = teamScores[countryName] || 0;
          return `
            <span class="team-chip${eliminated ? ' eliminated' : ''}"
                  title="${escapeHtml(countryName)}"
                  data-country="${escapeHtml(countryName)}">
              <img src="${escapeHtml(flagUrl)}" alt="${escapeHtml(countryName)}" loading="lazy" />
              <span class="team-code">${getTeamAbbreviation(countryName)}</span>
              <span class="team-points">${points}</span>
            </span>
          `;
        }).join('')}
      </div>
    `;
  }

  function getEntryRoundScoresHtml(roundScores, entryIdx) {
    return `
      <div class="round-breakdown-inline">
        ${ROUND_ORDER.map(round => `
          <span class="round-chip"
                title="${ROUND_LABELS[round] || round}"
                data-round="${round}"
                data-entry-idx="${entryIdx}">
            <span>${round}</span>
            <span class="round-chip-score">${roundScores[round] || 0}</span>
          </span>
        `).join('')}
      </div>
    `;
  }

  /* ─── Inline expansion ────────────────────────────────────── */
  function closeExpansion() {
    if (expandedExpansionEl) {
      expandedExpansionEl.remove();
      expandedExpansionEl = null;
    }
    if (expandedChipEl) {
      expandedChipEl.closest('.leaderboard-row')?.classList.remove('expanded');
      expandedChipEl = null;
    }
  }

  function showCountryExpansion(chip) {
    const countryName = chip.dataset.country;
    if (expandedChipEl === chip) { closeExpansion(); return; }
    closeExpansion();

    const team = allTeams.find(t => t.countryName === countryName);
    if (!team) return;

    let played = 0, wins = 0, draws = 0, losses = 0, goalsFor = 0, goalsAgainst = 0;
    (team.scoresByRound || []).forEach(round => {
      (round.matches || []).forEach(m => {
        played++;
        goalsFor     += m.goalsFor     || 0;
        goalsAgainst += m.goalsAgainst || 0;
        if (m.result === 'win')       wins++;
        else if (m.result === 'draw') draws++;
        else if (m.result === 'loss') losses++;
      });
    });

    let yellowCards = 0, redCards = 0;
    if (allMatches) {
      allMatches.filter(m => m.played && m.result).forEach(m => {
        if (m.homeTeam === countryName) {
          yellowCards += m.result.homeYellow || 0;
          redCards    += m.result.homeRed    || 0;
        } else if (m.awayTeam === countryName) {
          yellowCards += m.result.awayYellow || 0;
          redCards    += m.result.awayRed    || 0;
        }
      });
    }

    const roundItems = (team.scoresByRound || [])
      .filter(r => r.total !== 0)
      .map(r => {
        const neg = r.total < 0;
        return `
          <div class="expansion-round-item">
            <span class="expansion-round-lbl">${ROUND_LABELS[r.roundCode] || r.roundCode}</span>
            <span class="expansion-round-score${neg ? ' neg' : ''}">${r.total > 0 ? '+' : ''}${r.total}</span>
          </div>
        `;
      }).join('');

    const div = document.createElement('div');
    div.className = 'row-expansion';
    div.innerHTML = `
      <div class="expansion-header">
        <img src="${escapeHtml(team.flagUrl)}" alt="${escapeHtml(countryName)}" />
        <span class="expansion-title">${escapeHtml(countryName)}</span>
        <span class="expansion-subtitle">Group ${escapeHtml(team.group)} · MX$${team.cost}bn · ${team.totalPoints} pts</span>
        <button class="expansion-close" aria-label="Close">×</button>
      </div>
      <div class="expansion-stats">
        <div class="expansion-stat"><div class="expansion-stat-val">${played}</div><div class="expansion-stat-lbl">Played</div></div>
        <div class="expansion-stat"><div class="expansion-stat-val pos">${wins}</div><div class="expansion-stat-lbl">W</div></div>
        <div class="expansion-stat"><div class="expansion-stat-val">${draws}</div><div class="expansion-stat-lbl">D</div></div>
        <div class="expansion-stat"><div class="expansion-stat-val neg">${losses}</div><div class="expansion-stat-lbl">L</div></div>
        <div class="expansion-stat"><div class="expansion-stat-val pos">${goalsFor}</div><div class="expansion-stat-lbl">GF</div></div>
        <div class="expansion-stat"><div class="expansion-stat-val neg">${goalsAgainst}</div><div class="expansion-stat-lbl">GA</div></div>
        <div class="expansion-stat"><div class="expansion-stat-val amber">${yellowCards}</div><div class="expansion-stat-lbl">🟨</div></div>
        <div class="expansion-stat"><div class="expansion-stat-val neg">${redCards}</div><div class="expansion-stat-lbl">🟥</div></div>
      </div>
      ${roundItems ? `<div class="expansion-rounds">${roundItems}</div>` : ''}
    `;
    div.querySelector('.expansion-close').addEventListener('click', closeExpansion);

    const rowEl = chip.closest('.leaderboard-row');
    rowEl.appendChild(div);
    rowEl.classList.add('expanded');
    expandedChipEl = chip;
    expandedExpansionEl = div;
  }

  function showRoundExpansion(chip) {
    if (expandedChipEl === chip) { closeExpansion(); return; }
    closeExpansion();

    const entryIdx  = parseInt(chip.dataset.entryIdx, 10);
    const roundCode = chip.dataset.round;
    const entry = leaderboard[entryIdx];
    if (!entry) return;

    const roundLabel = ROUND_LABELS[roundCode] || roundCode;

    // ── Aggregate point categories across all selected teams for this round ──
    const cats = { result: 0, goalsScored: 0, goalsConceded: 0, disciplinary: 0, qualification: 0 };
    entry.selectedTeams.forEach(countryName => {
      const team = allTeams.find(t => t.countryName === countryName);
      const rd = team?.scoresByRound?.find(r => r.roundCode === roundCode);
      if (!rd) return;
      cats.result       += rd.result       || 0;
      cats.goalsScored  += rd.goalsScored  || 0;
      cats.goalsConceded+= rd.goalsConceded|| 0;
      cats.disciplinary += rd.disciplinary || 0;
      cats.qualification+= rd.roundQualification || rd.qualification || 0;
    });
    const grandTotal = Object.values(cats).reduce((s, v) => s + v, 0);

    function fmtStat(val) { return val > 0 ? `+${val}` : String(val); }
    function statCls(val) { return val > 0 ? 'pos' : val < 0 ? 'neg' : ''; }

    const typeRow = `
      <div class="expansion-stats" style="margin-bottom:4px;">
        <div class="expansion-stat">
          <div class="expansion-stat-val ${statCls(cats.result)}">${fmtStat(cats.result)}</div>
          <div class="expansion-stat-lbl">Results</div>
        </div>
        <div class="expansion-stat">
          <div class="expansion-stat-val ${statCls(cats.goalsScored)}">${fmtStat(cats.goalsScored)}</div>
          <div class="expansion-stat-lbl">Goals +</div>
        </div>
        <div class="expansion-stat">
          <div class="expansion-stat-val ${statCls(cats.goalsConceded)}">${fmtStat(cats.goalsConceded)}</div>
          <div class="expansion-stat-lbl">Goals −</div>
        </div>
        <div class="expansion-stat">
          <div class="expansion-stat-val ${statCls(cats.disciplinary)}">${fmtStat(cats.disciplinary)}</div>
          <div class="expansion-stat-lbl">Cards</div>
        </div>
        ${cats.qualification !== 0 ? `
        <div class="expansion-stat">
          <div class="expansion-stat-val ${statCls(cats.qualification)}">${fmtStat(cats.qualification)}</div>
          <div class="expansion-stat-lbl">Qual</div>
        </div>` : ''}
        <div class="expansion-stat" style="border-color:var(--navy-light);">
          <div class="expansion-stat-val ${statCls(grandTotal)}">${fmtStat(grandTotal)}</div>
          <div class="expansion-stat-lbl">Total</div>
        </div>
      </div>`;

    // ── Per-country chips ────────────────────────────────────────────────────
    const countryChips = entry.selectedTeams.map(countryName => {
      const team = allTeams.find(t => t.countryName === countryName);
      const roundData = team?.scoresByRound?.find(r => r.roundCode === roundCode);
      const pts = roundData?.total ?? null;
      const ptsDisplay = pts === null ? '—' : (pts > 0 ? `+${pts}` : String(pts));
      const neg = pts !== null && pts < 0;
      return `
        <div class="expansion-country-chip">
          <img src="${escapeHtml(team?.flagUrl || '')}" alt="${escapeHtml(countryName)}" />
          <span class="c-name">${escapeHtml(countryName)}</span>
          <span class="c-score${neg ? ' neg' : ''}">${ptsDisplay}</span>
        </div>`;
    }).join('');

    const div = document.createElement('div');
    div.className = 'row-expansion';
    div.innerHTML = `
      <div class="expansion-header">
        <span class="expansion-title">${escapeHtml(roundLabel)}</span>
        <span class="expansion-subtitle">${escapeHtml(entry.teamName)} — ${escapeHtml(entry.entrantName)}</span>
        <button class="expansion-close" aria-label="Close">×</button>
      </div>
      <div class="expansion-section-lbl">By type</div>
      ${typeRow}
      <hr class="expansion-divider">
      <div class="expansion-section-lbl">By country</div>
      <div class="expansion-country-grid">${countryChips}</div>
    `;
    div.querySelector('.expansion-close').addEventListener('click', closeExpansion);

    const rowEl = chip.closest('.leaderboard-row');
    rowEl.appendChild(div);
    rowEl.classList.add('expanded');
    expandedChipEl = chip;
    expandedExpansionEl = div;
  }

  /* ─── Find / pin helpers ──────────────────────────────────── */
  async function hashEmail(email) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(email.toLowerCase().trim()));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function loadEmailHashes() {
    try {
      const res = await fetch('./Data/emailHashes.json');
      if (res.ok) emailHashes = await res.json();
    } catch (_) {}
  }

  async function handleSearch(raw) {
    searchFilter = raw;
    findClear.hidden = !raw;
    if (!raw.trim()) {
      emailMatchTeams = new Set();
      findStatus.textContent = '';
      findStatus.className = 'find-status';
      renderBody();
      return;
    }
    if (raw.includes('@')) {
      const hash = await hashEmail(raw);
      emailMatchTeams = new Set(emailHashes[hash] || []);
      const count = emailMatchTeams.size;
      findStatus.textContent = count ? `${count} ${count === 1 ? 'team' : 'teams'} found` : 'No teams found';
      findStatus.className = count ? 'find-status found' : 'find-status notfound';
    } else {
      emailMatchTeams = new Set();
      const q = raw.toLowerCase().trim();
      const count = leaderboard.filter(e =>
        e.teamName.toLowerCase().includes(q) || e.entrantName.toLowerCase().includes(q)
      ).length;
      findStatus.textContent = count ? `${count} ${count === 1 ? 'match' : 'matches'}` : 'No matches';
      findStatus.className = count ? 'find-status found' : 'find-status notfound';
    }
    renderBody();
  }

  function getFilteredLeaderboard() {
    const q = searchFilter.trim().toLowerCase();
    if (!q) return leaderboard;
    if (searchFilter.includes('@')) return leaderboard.filter(e => emailMatchTeams.has(e.teamName));
    return leaderboard.filter(e =>
      e.teamName.toLowerCase().includes(q) || e.entrantName.toLowerCase().includes(q)
    );
  }

  function savePins() {
    localStorage.setItem('pg2026_pins', JSON.stringify([...pinnedTeams]));
  }

  function togglePin(teamName) {
    if (pinnedTeams.has(teamName)) pinnedTeams.delete(teamName);
    else pinnedTeams.add(teamName);
    savePins();
    applyHighlights();
    renderMiniPanel();
  }

  function applyHighlights() {
    document.querySelectorAll('.leaderboard-row[data-team-name]').forEach(row => {
      const pin = pinnedTeams.has(row.dataset.teamName);
      row.classList.toggle('row-pinned', pin);
      const star = row.querySelector('.star-btn');
      if (star) star.classList.toggle('pinned', pin);
    });
  }

  function renderMiniPanel() {
    if (!pinnedTeams.size || !leaderboard.length) {
      myPicksPanel.hidden = true;
      return;
    }
    const pinned = leaderboard
      .map((entry, idx) => ({ entry, rank: idx + 1 }))
      .filter(({ entry }) => pinnedTeams.has(entry.teamName));

    if (!pinned.length) { myPicksPanel.hidden = true; return; }

    myPicksPanel.hidden = false;
    myPicksRows.innerHTML = pinned.map(({ entry, rank }) => {
      const entryIdx = leaderboard.indexOf(entry);
      let rankDisplay = rank;
      if (rank === 1) rankDisplay = '🥇';
      else if (rank === 2) rankDisplay = '🥈';
      else if (rank === 3) rankDisplay = '🥉';
      return `
        <div class="leaderboard-row row-pinned" data-team-name="${escapeHtml(entry.teamName)}">
          <div class="rank" style="display:flex;flex-direction:column;align-items:center;gap:1px;">
            <button class="star-btn pinned"
                    data-team="${escapeHtml(entry.teamName)}"
                    title="Unpin">📌</button>
            ${rankDisplay}
          </div>
          <div class="player-info">
            <div class="player-name">${escapeHtml(entry.teamName)}</div>
            <div class="team-name">${escapeHtml(entry.entrantName)}</div>
          </div>
          ${scoreDisplayMode === 'countries'
            ? getSelectedTeamsHtml(entry.selectedTeams, entry.teamScores)
            : getEntryRoundScoresHtml(entry.roundScores, entryIdx)}
          <div class="team-count">${entry.teamsRemaining}/${entry.selectedTeams.length}</div>
          <div class="score-col">
            <span>${entry.totalScore}</span>
            ${getDeltaHtml(entry)}
          </div>
        </div>
      `;
    }).join('');
  }

  /* ─── Rendering ───────────────────────────────────────────── */
  function renderTournamentStats() {
    const el = document.getElementById('tournamentStatsBar');
    if (!el || !tournamentStats) return;
    const { gamesPlayed, totalGoals, totalYellowCards, totalRedCards } = tournamentStats;
    if (gamesPlayed === 0) { el.style.display = 'none'; return; }
    el.style.display = 'flex';
    el.innerHTML = `
      <div class="stats-bar-header">Tournament stats</div>
      <div class="stats-row">
        <div class="stats-pill">Games played <strong>${gamesPlayed}</strong></div>
        <div class="stats-pill">Total goals <strong>${totalGoals}</strong></div>
      </div>
      <div class="stats-row">
        <div class="stats-pill">🟨 Yellow cards <strong>${totalYellowCards}</strong></div>
        <div class="stats-pill">🟥 Red cards <strong>${totalRedCards}</strong></div>
      </div>
    `;
  }

  function renderAll() {
    closeExpansion();
    renderTournamentStats();
    leaderboardEl.classList.toggle('round-mode', scoreDisplayMode === 'rounds');
    leaderboardEl.classList.toggle('countries-mode', scoreDisplayMode === 'countries');
    if (!document.getElementById('lb-body')) {
      leaderboardEl.innerHTML = '<div id="lb-body"></div>';
    }
    renderHeader();
    renderBody();
    renderMiniPanel();
  }

  function renderHeader() {
    const headerEl = document.getElementById('lb-sticky-header');
    if (!headerEl) return;
    const picksLabel = scoreDisplayMode === 'countries' ? 'Picks' : 'Rounds';
    const filterHtml = scoreDisplayMode === 'countries' ? `
      <input class="picks-filter" id="picksFilterInput"
             placeholder="filter by country, comma for multiple…"
             value="${escapeHtml(picksFilter)}" />
    ` : '';
    headerEl.innerHTML = `
      <div class="leaderboard-header">
        <div>Rank</div>
        <div>Team</div>
        <div class="picks-filter-wrap">
          <span>${picksLabel}</span>
          ${filterHtml}
        </div>
        <div>Left</div>
        <div>Score</div>
      </div>
    `;
    if (scoreDisplayMode === 'countries') {
      const filterInput = document.getElementById('picksFilterInput');
      if (filterInput) {
        filterInput.addEventListener('input', e => {
          picksFilter = e.target.value;
          renderBody();
        });
      }
    }
  }

  function renderBody() {
    const bodyEl = document.getElementById('lb-body');
    if (!bodyEl) return;
    expandedChipEl = null;
    expandedExpansionEl = null;

    if (leaderboard.length === 0) {
      bodyEl.innerHTML = `
        <div class="empty-state">
          <h2>No entries yet</h2>
          <p><a href="entry.html">Enter the game</a> to get on the leaderboard.</p>
        </div>
      `;
      return;
    }

    let filtered = getFilteredLeaderboard();
    if (scoreDisplayMode === 'countries' && picksFilter) {
      const terms = picksFilter.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
      filtered = filtered.filter(entry =>
        terms.every(q =>
          entry.selectedTeams.some(name =>
            name.toLowerCase().includes(q) ||
            getTeamAbbreviation(name).toLowerCase().startsWith(q)
          )
        )
      );
    }

    let html = '';
    filtered.forEach(entry => {
      const originalRank = leaderboard.indexOf(entry) + 1;
      let rankClass = '', rankEmoji = originalRank;
      if (originalRank === 1) { rankClass = 'first';  rankEmoji = '🥇'; }
      else if (originalRank === 2) { rankClass = 'second'; rankEmoji = '🥈'; }
      else if (originalRank === 3) { rankClass = 'third';  rankEmoji = '🥉'; }

      const entryIdx = leaderboard.indexOf(entry);
      const pin = pinnedTeams.has(entry.teamName);
      const rowClasses = [
        originalRank % 10 === 0 ? 'milestone-row' : '',
        pin ? 'row-pinned' : '',
      ].filter(Boolean).join(' ');
      html += `
        <div class="leaderboard-row${rowClasses ? ' ' + rowClasses : ''}"
             data-team-name="${escapeHtml(entry.teamName)}">
          <div class="rank ${rankClass}" style="display:flex;flex-direction:column;align-items:center;gap:1px;">
            <button class="star-btn${pin ? ' pinned' : ''}"
                    data-team="${escapeHtml(entry.teamName)}"
                    title="${pin ? 'Unpin' : 'Pin to My picks'}">📌</button>
            ${rankEmoji}
          </div>
          <div class="player-info">
            <div class="player-name">${escapeHtml(entry.teamName)}</div>
            <div class="team-name">${escapeHtml(entry.entrantName)}</div>
          </div>
          ${scoreDisplayMode === 'countries'
            ? getSelectedTeamsHtml(entry.selectedTeams, entry.teamScores)
            : getEntryRoundScoresHtml(entry.roundScores, entryIdx)}
          <div class="team-count">${entry.teamsRemaining}/${entry.selectedTeams.length}</div>
          <div class="score-col">
            <span>${entry.totalScore}</span>
            ${getDeltaHtml(entry)}
          </div>
        </div>
      `;
    });

    if (filtered.length === 0) {
      const reason = searchFilter
        ? `No entries match "${escapeHtml(searchFilter)}".`
        : picksFilter
          ? `No entries include "${escapeHtml(picksFilter)}".`
          : 'No entries yet.';
      html += `<div class="empty-state"><h2>No matches</h2><p>${reason}</p></div>`;
    }

    bodyEl.innerHTML = html;
  }

  /* ─── Chip click event delegation ────────────────────────── */
  leaderboardEl.addEventListener('click', handleChipClick);
  myPicksRows.addEventListener('click', handleChipClick);

  function handleChipClick(e) {
    if (e.target.closest('.expansion-close')) return;
    const starBtn = e.target.closest('.star-btn[data-team]');
    if (starBtn) {
      e.stopPropagation();
      togglePin(starBtn.dataset.team);
      return;
    }
    const countryChip = e.target.closest('.team-chip[data-country]');
    if (countryChip) {
      e.stopPropagation();
      showCountryExpansion(countryChip);
      return;
    }
    const roundChip = e.target.closest('.round-chip[data-round]');
    if (roundChip) {
      e.stopPropagation();
      showRoundExpansion(roundChip);
    }
  }

  // Find bar event listeners
  let findTimer = null;
  emailInput.addEventListener('input', () => {
    clearTimeout(findTimer);
    findTimer = setTimeout(() => handleSearch(emailInput.value), 350);
  });
  findClear.addEventListener('click', () => {
    emailInput.value = '';
    handleSearch('');
  });

  /* ─── Utilities ───────────────────────────────────────────── */
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function updateScoreModeButton() {
    scoreModeToggleBtn.textContent = scoreDisplayMode === 'countries' ? 'Round scores' : 'Country scores';
    scoreModeSelect.value = scoreDisplayMode;
    leaderboardEl.classList.toggle('round-mode', scoreDisplayMode === 'rounds');
    leaderboardEl.classList.toggle('countries-mode', scoreDisplayMode === 'countries');
  }

  scoreModeToggleBtn.addEventListener('click', () => {
    scoreDisplayMode = scoreDisplayMode === 'countries' ? 'rounds' : 'countries';
    picksFilter = '';
    updateScoreModeButton();
    renderAll();
  });

  scoreModeSelect.addEventListener('change', () => {
    scoreDisplayMode = scoreModeSelect.value;
    picksFilter = '';
    updateScoreModeButton();
    renderAll();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeExpansion();
  });

  /* ─── Sticky controls-row height tracker ─────────────────── */
  (function () {
    const row = document.querySelector('.controls-row');
    if (!row || !window.ResizeObserver) return;
    function sync() {
      if (window.innerWidth >= 769) {
        document.documentElement.style.setProperty('--controls-height', row.offsetHeight + 'px');
      } else {
        document.documentElement.style.setProperty('--controls-height', '0px');
      }
    }
    new ResizeObserver(sync).observe(row);
    window.addEventListener('resize', sync);
    sync();
  })();

  /* ─── Init ────────────────────────────────────────────────── */
  async function init() {
    updateScoreModeButton();
    await loadEmailHashes();
    if (await loadAllData()) renderAll();
  }

  init();

  /* ─── Scroll nav ──────────────────────────────────────────── */
  (function () {
    const topBtn = document.getElementById('scrollTopBtn');
    const botBtn = document.getElementById('scrollBotBtn');
    topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    botBtn.addEventListener('click', () => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }));
    function update() {
      const nearTop = window.scrollY < 120;
      const nearBot = window.scrollY + window.innerHeight >= document.body.scrollHeight - 120;
      topBtn.classList.toggle('hidden', nearTop);
      botBtn.classList.toggle('hidden', nearBot);
    }
    window.addEventListener('scroll', update, { passive: true });
    update();
  })();
</script>
</body>
</html>
