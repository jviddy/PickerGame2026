<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard – Picker Game 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
  <style>
    /* ─── Tokens ──────────────────────────────────────────────────── */
    :root {
      --navy:       #0b4f2f;
      --navy-light: #147a45;
      --gold:       #f2c94c;
      --gold-dark:  #c99a1c;
      --green:      #22a861;
      --green-bg:   #e4f7eb;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --amber:      #c86b2c;
      --amber-bg:   #fff1dc;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --white:      #ffffff;
      --radius:     10px;
      --shadow:     0 1px 4px rgba(0,0,0,0.10);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.12);
    }

    /* ─── Base ──────────────────────────────────────────────────────*/
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 15px;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ─── Header ────────────────────────────────────────────────────*/
    header {
      background:
        linear-gradient(135deg, #167a49 0%, #22a861 58%, #8fcf45 100%);
      color: var(--white);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 10px rgba(11,79,47,0.24);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }
    .logo { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 0; }
    .logo span { color: var(--gold); }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--white); }

    /* ─── Main container ────────────────────────────────────────────*/
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ─── Page header ───────────────────────────────────────────────*/
    .page-header {
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .page-header p {
      color: var(--gray-600);
      margin: 0;
      font-size: 0.95rem;
    }

    .view-toggle {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin: -8px 0 14px;
    }
    .view-toggle-btn {
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--navy);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 7px 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .view-toggle-btn:hover {
      border-color: var(--navy-light);
      background: var(--green-bg);
    }

    /* ─── Leaderboard table ───────────────────────────────────────–*/
    .leaderboard {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .leaderboard-header {
      display: grid;
      grid-template-columns: 50px minmax(0, 1fr) minmax(220px, 0.9fr) 70px 80px;
      gap: 10px;
      padding: 10px 14px;
      background: var(--navy);
      color: var(--white);
      font-weight: 800;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
      border-bottom: 2px solid var(--navy-light);
    }
    @media (max-width: 768px) {
      .leaderboard-header {
        grid-template-columns: 32px minmax(0, 1fr) 52px;
        gap: 6px;
        padding: 8px 10px;
        font-size: 0.68rem;
      }
      .leaderboard-header > :nth-child(3),
      .leaderboard-header > :nth-child(4) { display: none; }
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 50px minmax(0, 1fr) minmax(220px, 0.9fr) 70px 80px;
      column-gap: 10px;
      row-gap: 6px;
      padding: 9px 14px 10px;
      border-bottom: 1px solid var(--gray-200);
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .leaderboard-row:hover { background: var(--gray-50); }
    .leaderboard-row.expanded { background: var(--gray-50); }
    .leaderboard-row.milestone-row {
      background: var(--gray-50);
    }
    .leaderboard-row.milestone-row:hover,
    .leaderboard-row.milestone-row.expanded {
      background: var(--gray-100);
    }
    @media (max-width: 768px) {
      .leaderboard-row {
        grid-template-columns: 32px minmax(0, 1fr) 52px;
        column-gap: 6px;
        row-gap: 5px;
        padding: 8px 10px;
      }
      .team-count { display: none; }
    }

    /* ─── Rank badge ─────────────────────────────────────────────––*/
    .rank {
      grid-column: 1;
      grid-row: 1 / span 2;
      font-weight: 800;
      font-size: 1.05rem;
      text-align: center;
      color: var(--navy);
    }
    .rank.first { color: var(--gold); font-size: 1.25rem; }
    .rank.second { color: #c0c0c0; font-size: 1.25rem; }
    .rank.third { color: #cd7f32; font-size: 1.25rem; }

    /* ─── Player info ─────────────────────────────────────────────––*/
    .player-info {
      display: flex;
      grid-column: 2;
      grid-row: 1;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }
    .player-name {
      font-weight: 800;
      font-size: 0.92rem;
      color: var(--navy);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .team-name {
      font-size: 0.74rem;
      color: var(--gray-600);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── Score display ──────────────────────────────────────────––*/
    .score-col {
      grid-column: 5;
      grid-row: 1 / span 2;
      text-align: center;
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--green);
    }
    .team-count {
      grid-column: 4;
      grid-row: 1 / span 2;
      align-self: center;
      text-align: center;
      font-size: 0.78rem;
      color: var(--gray-600);
      font-weight: 600;
    }
    .selected-teams {
      display: flex;
      grid-column: 2 / 5;
      grid-row: 2;
      flex-wrap: nowrap;
      gap: 4px;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }
    .team-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      padding: 2px 5px 2px 3px;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--gray-50);
      color: var(--navy);
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1;
      flex: 0 0 auto;
    }
    .team-chip img {
      width: 18px;
      height: 13px;
      border-radius: 2px;
      object-fit: cover;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .team-chip.eliminated {
      color: var(--gray-400);
      background: var(--gray-100);
    }
    .team-chip.eliminated img {
      filter: grayscale(1);
      opacity: 0.52;
    }
    .team-points {
      color: var(--green);
      font-weight: 900;
    }
    .round-breakdown-inline {
      display: flex;
      grid-column: 2 / 5;
      grid-row: 2;
      flex-wrap: nowrap;
      gap: 4px;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }
    .round-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--gray-50);
      color: var(--navy);
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1;
      flex: 0 0 auto;
    }
    .round-chip-score {
      color: var(--green);
      font-weight: 900;
    }
    @media (max-width: 768px) {
      .score-col {
        grid-column: 3;
      }
      .selected-teams {
        grid-column: 2 / 3;
        gap: 3px;
      }
      .round-breakdown-inline {
        grid-column: 2 / 3;
        gap: 3px;
      }
      .team-chip {
        padding: 0;
        border: none;
        background: transparent;
      }
      .team-chip img {
        width: 14px;
        height: 10px;
      }
      .team-chip span {
        display: none;
      }
    }

    .leaderboard.compact .leaderboard-header {
      grid-template-columns: 42px minmax(245px, 300px) minmax(0, 1fr) 58px 64px;
      padding: 7px 12px;
      font-size: 0.68rem;
    }
    .leaderboard.compact .leaderboard-row {
      grid-template-columns: 42px minmax(245px, 300px) minmax(0, 1fr) 58px 64px;
      column-gap: 8px;
      row-gap: 0;
      padding: 6px 12px;
    }
    .leaderboard.compact .rank {
      grid-row: 1;
      font-size: 0.9rem;
    }
    .leaderboard.compact .rank.first,
    .leaderboard.compact .rank.second,
    .leaderboard.compact .rank.third {
      font-size: 1rem;
    }
    .leaderboard.compact .player-info {
      grid-row: 1;
      gap: 6px;
    }
    .leaderboard.compact .player-name {
      font-size: 0.82rem;
    }
    .leaderboard.compact .team-name {
      font-size: 0.68rem;
    }
    .leaderboard.compact .selected-teams {
      grid-column: 3;
      grid-row: 1;
      gap: 2px;
    }
    .leaderboard.compact .round-breakdown-inline {
      grid-column: 3;
      grid-row: 1;
      gap: 2px;
    }
    .leaderboard.compact .team-chip {
      padding: 1px 5px 1px 2px;
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
    }
    .leaderboard.compact .round-chip {
      padding: 1px 5px;
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
      font-size: 0.62rem;
    }
    .leaderboard.compact .team-chip img {
      width: 15px;
      height: 11px;
    }
    .leaderboard.compact .team-chip span {
      display: none;
    }
    @media (min-width: 900px) {
      .leaderboard.compact .team-chip {
        gap: 3px;
      }
      .leaderboard.compact .team-chip .team-code {
        display: inline;
        font-size: 0.62rem;
      }
      .leaderboard.compact .team-chip .team-points {
        display: none;
      }
    }
    @media (min-width: 1000px) {
      .leaderboard.compact .team-chip .team-points {
        display: inline;
        font-size: 0.62rem;
      }
    }
    .leaderboard.compact .team-count {
      grid-column: 4;
      grid-row: 1;
      font-size: 0.7rem;
    }
    .leaderboard.compact .score-col {
      grid-column: 5;
      grid-row: 1;
      font-size: 0.92rem;
    }
    @media (max-width: 768px) {
      .view-toggle {
        justify-content: stretch;
        margin-top: -6px;
      }
      .view-toggle-btn {
        width: 100%;
      }
      .leaderboard.compact .leaderboard-header {
        grid-template-columns: 30px minmax(0, 1fr) 44px;
        gap: 6px;
        padding: 7px 10px;
      }
      .leaderboard.compact .leaderboard-header > :nth-child(3),
      .leaderboard.compact .leaderboard-header > :nth-child(4) {
        display: none;
      }
      .leaderboard.compact .leaderboard-row {
        grid-template-columns: 30px minmax(0, 1fr) 44px;
        gap: 6px;
        padding: 6px 10px;
      }
      .leaderboard.compact .selected-teams,
      .leaderboard.compact .round-breakdown-inline,
      .leaderboard.compact .team-count {
        display: none;
      }
      .leaderboard.compact.round-mode .leaderboard-row {
        row-gap: 4px;
      }
      .leaderboard.compact.round-mode .round-breakdown-inline {
        display: flex;
        grid-column: 2 / 4;
        grid-row: 2;
        overflow-x: auto;
        padding-bottom: 1px;
      }
      .leaderboard.compact.round-mode .round-chip {
        gap: 3px;
        font-size: 0.58rem;
        padding: 1px 5px;
        border: 1px solid var(--gray-200);
        background: var(--gray-50);
      }
      .leaderboard.compact .score-col {
        grid-column: 3;
      }
      .leaderboard.compact .team-name {
        display: none;
      }
    }
    .tiebreaker-info {
      display: none;
    }

    /* ─── Expanded details ───────────────────────────────────────––*/
    .details {
      display: none;
      grid-column: 1 / -1;
      padding: 20px 16px;
      background: var(--gray-50);
      border-top: 1px solid var(--gray-200);
    }
    .details.show { display: block; }

    .picks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .pick-card {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .pick-country {
      font-weight: 800;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: var(--navy);
    }
    .pick-score {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--green);
      margin-bottom: 4px;
    }
    .pick-detail {
      font-size: 0.7rem;
      color: var(--gray-400);
      line-height: 1.3;
    }

    .tiebreaker-section {
      display: none;
    }
    .tiebreaker-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--gray-600);
    }

    .round-breakdown {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--gray-200);
    }
    .round-breakdown h4 {
      margin: 0 0 10px;
      font-size: 0.9rem;
      color: var(--navy);
    }
    .round-scores {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
    .round-score-item {
      background: var(--gray-50);
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
      font-size: 0.8rem;
    }
    .round-score-label {
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 3px;
    }
    .round-score-value {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--green);
    }

    /* ─── Empty state ─────────────────────────────────────────────––*/
    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--gray-600);
    }
    .empty-state h2 { margin: 0 0 8px; color: var(--navy); }
    .empty-state p { margin: 0; }

    /* ─── Error state ─────────────────────────────────────────────––*/
    .error-msg {
      padding: 16px;
      background: var(--red-bg);
      border: 1.5px solid var(--red);
      border-radius: var(--radius);
      color: var(--red);
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .error-msg.show { display: block; }

    /* Expand indicator */
    .expand-icon {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 1.1rem;
    }
    .leaderboard-row.expanded .expand-icon {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1 class="logo">Picker<span>Game</span> <span style="font-weight:400;color:rgba(255,255,255,0.6)">2026</span></h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="entry.html">Enter</a>
      <a href="schedule.html">Matches</a>
      <a href="countries.html">Countries</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="page-header">
    <h1>⚽ Leaderboard</h1>
    <p>Current standings — calculated from live match results.</p>
  </div>

  <div class="view-toggle">
    <button class="view-toggle-btn" id="scoreModeToggleBtn" type="button">Round scores</button>
    <button class="view-toggle-btn" id="viewToggleBtn" type="button">Detailed view</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="leaderboard compact" id="leaderboard">
    <div class="empty-state">
      <h2>Loading leaderboard…</h2>
      <p>Calculating scores from match results.</p>
    </div>
  </div>
</div>

<script>
  /* ─── Config ──────────────────────────────────────────── */
  const DATA_URLS = {
    teams:   './Data/teams.json',
    teamPoints: './Data/teamPoints.json',
    entrantTotals: './Data/entrantTotals.json'
  };
  const ROUND_ORDER = ['GS1', 'GS2', 'GS3', 'R32', 'R16', 'QF', 'SF', 'TPP', 'F'];
  const ROUND_LABELS = {
    GS1: 'Group Stage 1',
    GS2: 'Group Stage 2',
    GS3: 'Group Stage 3',
    R32: 'Round of 32',
    R16: 'Round of 16',
    QF: 'Quarter-finals',
    SF: 'Semi-finals',
    TPP: 'Third Place',
    F: 'Final',
  };

  let allTeams = [];
  let teamPoints = [];
  let leaderboard = []; // cached calculated leaderboard
  let isCompactView = true;
  let scoreDisplayMode = 'countries';

  /* ─── DOM ─────────────────────────────────────────────── */
  const leaderboardEl = document.getElementById('leaderboard');
  const viewToggleBtn = document.getElementById('viewToggleBtn');
  const scoreModeToggleBtn = document.getElementById('scoreModeToggleBtn');
  const errorMsg = document.getElementById('errorMsg');

  /* ─── Data loading ────────────────────────────────────── */
  async function loadAllData() {
    try {
      const responses = await Promise.all([
        fetch(DATA_URLS.teams),
        fetch(DATA_URLS.teamPoints),
        fetch(DATA_URLS.entrantTotals)
      ]);

      const data = await Promise.all(responses.map(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      }));

      allTeams = data[0];
      teamPoints = data[1];
      leaderboard = data[2].map(entry => {
        const teamScores = {};
        entry.teamBreakdown.forEach(team => {
          teamScores[team.countryName] = team.points;
        });

        return {
          entrantName: entry.entrantName,
          teamName: entry.entrantTeamName,
          totalScore: entry.totalPoints,
          teamsRemaining: entry.teamsRemaining,
          selectedTeams: entry.selectedTeams || entry.teamBreakdown.map(team => team.countryName),
          teamScores,
          roundScores: entry.byRound || {},
          tb1: entry.tieBreakers ? entry.tieBreakers[0] : '',
          tb2: entry.tieBreakers ? entry.tieBreakers[1] : '',
        };
      });

      return true;
    } catch (e) {
      console.error('Error loading data:', e);
      showError(`Failed to load data: ${e.message}`);
      return false;
    }
  }

  function getTeamByCountryName(countryName) {
    return allTeams.find(t => t.countryName === countryName);
  }

  function isTeamEliminated(countryName) {
    const points = teamPoints.find(team => team.countryName === countryName);
    return points ? points.inCompetition === false : false;
  }

  function getTeamAbbreviation(countryName) {
    const overrides = {
      'United States': 'USA',
      'South Africa': 'RSA',
      'South Korea': 'KOR',
      'Czech Republic': 'CZE',
      'New Zealand': 'NZL',
      'Saudi Arabia': 'KSA',
      'Ivory Coast': 'CIV',
      'Cape Verde': 'CPV',
      'Netherlands': 'NED',
    };

    if (overrides[countryName]) return overrides[countryName];
    return countryName.replace(/\[.*?\]/g, '').replace(/[^A-Za-z]/g, '').slice(0, 3).toUpperCase();
  }

  function getSelectedTeamsHtml(selectedTeams, teamScores = {}) {
    return `
      <div class="selected-teams">
        ${selectedTeams.map(countryName => {
          const team = getTeamByCountryName(countryName);
          const eliminated = isTeamEliminated(countryName);
          const flagUrl = team ? team.flagUrl : '';
          const points = teamScores[countryName] || 0;
          return `
            <span class="team-chip${eliminated ? ' eliminated' : ''}" title="${escapeHtml(countryName)}">
              <img src="${flagUrl}" alt="${escapeHtml(countryName)}" loading="lazy" />
              <span class="team-code">${getTeamAbbreviation(countryName)}</span>
              <span class="team-points">${points}</span>
            </span>
          `;
        }).join('')}
      </div>
    `;
  }

  function getEntryRoundScoresHtml(roundScores) {
    return `
      <div class="round-breakdown-inline">
        ${ROUND_ORDER.map(round => `
          <span class="round-chip" title="${ROUND_LABELS[round] || round}">
            <span>${round}</span>
            <span class="round-chip-score">${roundScores[round] || 0}</span>
          </span>
        `).join('')}
      </div>
    `;
  }

  function getRoundBreakdownHtml(entry) {
    const roundScores = entry.roundScores || {};
    let html = '<div class="round-breakdown"><h4>Score by Round</h4><div class="round-scores">';
    ROUND_ORDER.forEach(round => {
      const score = roundScores[round] || 0;
      if (score > 0) { // Only show rounds with points
        html += `
          <div class="round-score-item">
            <div class="round-score-label">${ROUND_LABELS[round] || round}</div>
            <div class="round-score-value">${score}</div>
          </div>
        `;
      }
    });
    html += '</div></div>';
    
    return html;
  }

  /* ─── Rendering ───────────────────────────────────────– */
  function renderLeaderboard() {
    if (leaderboard.length === 0) {
      leaderboardEl.innerHTML = `
        <div class="empty-state">
          <h2>No entries yet</h2>
          <p><a href="entry.html">Enter the game</a> to get on the leaderboard.</p>
        </div>
      `;
      return;
    }

    let html = `
      <div class="leaderboard-header">
        <div>Rank</div>
        <div>Team</div>
        <div>${scoreDisplayMode === 'countries' ? 'Picks' : 'Rounds'}</div>
        <div>Teams Left</div>
        <div>Score</div>
      </div>
    `;

    leaderboard.forEach((entry, idx) => {
      const rank = idx + 1;
      const rowId = `row-${idx}`;
      let rankClass = '';
      let rankEmoji = rank;
      if (rank === 1) { rankClass = 'first'; rankEmoji = '🥇'; }
      else if (rank === 2) { rankClass = 'second'; rankEmoji = '🥈'; }
      else if (rank === 3) { rankClass = 'third'; rankEmoji = '🥉'; }

      const teamCount = entry.selectedTeams.length;
      const teamsRemaining = entry.teamsRemaining;

      html += `
        <div class="leaderboard-row${rank % 10 === 0 ? ' milestone-row' : ''}" id="${rowId}" data-entry-idx="${idx}">
          <div class="rank ${rankClass}">${rankEmoji}</div>
          <div class="player-info">
            <div class="player-name">${escapeHtml(entry.teamName)}</div>
            <div class="team-name">${escapeHtml(entry.entrantName)}</div>
          </div>
          ${scoreDisplayMode === 'countries'
            ? getSelectedTeamsHtml(entry.selectedTeams, entry.teamScores)
            : getEntryRoundScoresHtml(entry.roundScores)}
          <div class="team-count">${teamsRemaining}/${teamCount}</div>
          <div class="score-col">${entry.totalScore}</div>
        </div>

        <div class="details" id="details-${idx}">
          <h3 style="margin:0 0 12px; font-size:1rem;">Selected Teams</h3>
          <div class="picks-grid">
            ${entry.selectedTeams.map(countryName => {
              const score = entry.teamScores[countryName];
              return `
                <div class="pick-card">
                  <div class="pick-country">${escapeHtml(countryName)}</div>
                  <div class="pick-score">${score}</div>
                  <div class="pick-detail">pts from ${entry.selectedTeams.length} picks</div>
                </div>
              `;
            }).join('')}
          </div>
          ${getRoundBreakdownHtml(entry)}
          <div class="tiebreaker-section">
            <strong>Tiebreaker Answers:</strong>
            <div class="tiebreaker-item">
              <span>Total goals in tournament:</span>
              <strong>${escapeHtml(entry.tb1 || '—')}</strong>
            </div>
            <div class="tiebreaker-item">
              <span>Last goal time (minutes):</span>
              <strong>${escapeHtml(entry.tb2 || '—')}</strong>
            </div>
          </div>
        </div>
      `;
    });

    leaderboardEl.innerHTML = html;

    // Add toggle listeners
    document.querySelectorAll('.leaderboard-row').forEach((row, idx) => {
      row.addEventListener('click', () => toggleDetails(row, idx));
    });
  }

  function toggleDetails(rowEl, idx) {
    const detailsEl = document.getElementById(`details-${idx}`);
    const isExpanded = detailsEl.classList.contains('show');

    // Close all
    document.querySelectorAll('.details').forEach(d => d.classList.remove('show'));
    document.querySelectorAll('.leaderboard-row').forEach(r => r.classList.remove('expanded'));

    // Open this one if it wasn't open
    if (!isExpanded) {
      detailsEl.classList.add('show');
      rowEl.classList.add('expanded');
    }
  }

  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  /* ─── Utilities ───────────────────────────────────────– */
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function hideError() {
    errorMsg.classList.remove('show');
  }

  function updateViewMode() {
    leaderboardEl.classList.toggle('compact', isCompactView);
    viewToggleBtn.textContent = isCompactView ? 'Detailed view' : 'Compact view';
  }

  function updateScoreModeButton() {
    scoreModeToggleBtn.textContent = scoreDisplayMode === 'countries' ? 'Round scores' : 'Country scores';
    leaderboardEl.classList.toggle('round-mode', scoreDisplayMode === 'rounds');
  }

  viewToggleBtn.addEventListener('click', () => {
    isCompactView = !isCompactView;
    updateViewMode();
  });

  scoreModeToggleBtn.addEventListener('click', () => {
    scoreDisplayMode = scoreDisplayMode === 'countries' ? 'rounds' : 'countries';
    updateScoreModeButton();
    renderLeaderboard();
  });

  /* ─── Init ────────────────────────────────────────────– */
  async function init() {
    updateViewMode();
    updateScoreModeButton();
    if (await loadAllData()) {
      renderLeaderboard();
    }
  }

  init();
</script>
</body>
</html>
