<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matches - Picker Game 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
  <style>
    :root {
      --navy:       #1a3352;
      --navy-light: #2d5a8e;
      --gold:       #e86f2c;
      --gold-dark:  #c4561a;
      --green:      #22a861;
      --green-bg:   #e4f7eb;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --amber:      #c86b2c;
      --amber-bg:   #fff1dc;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --white:      #ffffff;
      --radius:     10px;
      --shadow-md:  0 4px 16px rgba(0,0,0,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 15px;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a3352 0%, #1e4070 100%);
      color: var(--white);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 10px rgba(11,79,47,0.24);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }
    .logo { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 0; }
    .logo span { color: var(--gold); }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover,
    nav a.active { color: var(--white); }
    .nav-select {
      display: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .nav-select option { color: #000; }
    @media (max-width: 768px) {
      nav { display: none; }
      .nav-select { display: block; }
    }

    /* ── Sticky controls bar ─────────────────────────────────────── */
    .controls-bar {
      position: sticky;
      top: 58px;
      z-index: 90;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .controls-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .controls-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .group-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 3px;
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
    }
    .group-toggle-btn {
      border: none;
      border-radius: 99px;
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 900;
      padding: 6px 10px;
      transition: background 0.15s, color 0.15s;
    }
    .group-toggle-btn.active {
      background: var(--navy);
      color: var(--white);
    }
    .group-toggle-btn:not(.active):hover { background: var(--green-bg); }

    .date-select {
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--navy);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
      max-width: 160px;
    }
    .date-select:focus { border-color: var(--navy-light); }

    .section-pills {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }
    .section-pill {
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--navy);
      font-size: 0.74rem;
      font-weight: 800;
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .section-pill:hover {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    /* ── Page content ────────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .page-header {
      margin-bottom: 18px;
    }
    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 6px;
    }
    .page-header p {
      color: var(--gray-600);
      margin: 0;
      font-size: 0.95rem;
    }
    .time-badge {
      display: inline-flex;
      margin-top: 8px;
      border: 1.5px solid var(--navy-light);
      border-radius: 99px;
      background: var(--green-bg);
      color: var(--navy);
      font-size: 0.78rem;
      font-weight: 900;
      padding: 5px 11px;
    }

    .error-msg {
      display: none;
      padding: 12px 14px;
      border: 1.5px solid var(--red);
      border-radius: var(--radius);
      background: var(--red-bg);
      color: var(--red);
      font-weight: 700;
      margin-bottom: 14px;
    }
    .error-msg.show { display: block; }

    .round-section {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin-bottom: 18px;
      scroll-margin-top: 130px;
    }
    .round-heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--navy);
      color: var(--white);
      border-bottom: 2px solid var(--navy-light);
      cursor: pointer;
      user-select: none;
    }
    .round-heading:hover { background: var(--navy-light); }
    .round-section.collapsed .round-heading { border-bottom: none; }
    .round-heading h2 {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
    }
    .round-heading-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .round-count {
      color: rgba(255,255,255,0.78);
      font-size: 0.76rem;
      font-weight: 800;
    }
    .round-toggle {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      line-height: 1;
      transition: transform 0.18s;
      display: inline-block;
    }
    .round-section.collapsed .round-toggle { transform: rotate(-90deg); }
    .round-section.collapsed .match-card { display: none; }

    .match-card {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr) minmax(210px, 0.8fr);
      column-gap: 14px;
      row-gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--gray-200);
      scroll-margin-top: 130px;
    }
    .match-card:last-child { border-bottom: none; }
    .match-card.played { background: linear-gradient(90deg, var(--green-bg), var(--white) 18%); }
    .match-meta {
      color: var(--gray-600);
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .match-date {
      color: var(--navy);
      font-weight: 900;
      font-size: 0.82rem;
    }
    .match-time {
      display: inline-flex;
      margin-top: 4px;
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--green-bg);
      color: var(--navy);
      font-weight: 900;
    }
    .match-location {
      margin-top: 7px;
      color: var(--gray-600);
    }
    .match-prediction {
      margin-top: 4px;
      font-size: 0.72rem;
      color: var(--gray-400);
    }
    .match-prediction strong {
      font-weight: 700;
      color: var(--gray-500);
    }

    .match-main { min-width: 0; }
    .teams {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }
    .team {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      min-width: 0;
    }
    .team.away { align-items: flex-end; text-align: right; }
    .team-identity {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .team-cards { display: flex; gap: 5px; flex-wrap: wrap; }
    .team-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--navy);
      font-weight: 900;
      font-size: 0.92rem;
    }
    .flag {
      width: 24px;
      height: 17px;
      border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.08);
      object-fit: cover;
      flex: 0 0 auto;
      background: var(--gray-100);
    }
    .flag.placeholder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-400);
      font-size: 0.65rem;
      font-weight: 900;
    }
    .scoreline {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 70px;
    }
    .score {
      color: var(--navy);
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1;
    }
    .score.pending {
      color: var(--gray-400);
      font-size: 0.8rem;
      text-transform: uppercase;
    }
    .penalties { color: var(--amber); font-size: 0.68rem; font-weight: 900; white-space: nowrap; }
    .card-note { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; font-weight: 800; }
    .card-note.red { color: var(--red); }
    .card-note.yellow { color: var(--gold-dark); }
    .card-square { display: inline-block; width: 9px; height: 12px; border-radius: 1px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
    .card-square.red { background: var(--red); }
    .card-square.yellow { background: var(--gold); }

    .points-panel {
      align-self: center;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      background: var(--gray-50);
      padding: 8px;
      min-width: 0;
    }
    .points-empty { color: var(--gray-600); font-size: 0.78rem; font-weight: 700; text-align: center; }
    .points-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      color: var(--navy);
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .points-total { color: var(--green); font-size: 0.88rem; }
    .points-team {
      display: grid;
      grid-template-columns: minmax(0, 86px) minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--gray-200);
    }
    .points-team:first-of-type { padding-top: 0; border-top: none; }
    .points-team + .points-team { margin-top: 6px; }
    .points-team-name { color: var(--navy); font-size: 0.74rem; font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .point-chips { display: flex; gap: 3px; flex-wrap: wrap; min-width: 0; }
    .point-chip {
      display: inline-flex;
      gap: 3px;
      align-items: center;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--gray-600);
      font-size: 0.64rem;
      font-weight: 800;
      line-height: 1;
      padding: 2px 5px;
    }
    .point-chip.positive { color: var(--navy); background: var(--green-bg); }
    .point-chip.negative { color: var(--red); background: var(--red-bg); }
    .team-point-total { color: var(--green); font-size: 0.82rem; font-weight: 900; text-align: right; }

    .loading { padding: 28px 14px; color: var(--gray-600); text-align: center; font-weight: 700; }

    @media (max-width: 900px) {
      .match-card { grid-template-columns: 1fr; }
      .match-meta {
        display: grid;
        grid-template-columns: auto auto minmax(0, 1fr);
        gap: 8px;
        align-items: center;
      }
      .match-time { margin-top: 0; }
      .match-location { margin-top: 0; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    }
    @media (max-width: 560px) {
      header { padding: 0 14px; }
      nav a { margin-left: 12px; font-size: 0.82rem; }
      .container { padding: 18px 10px; }
      .controls-inner { padding: 8px 10px; }
      .page-header h1 { font-size: 1.45rem; }
      .match-card { padding: 10px; }
      .match-meta { grid-template-columns: 1fr auto; }
      .match-location { grid-column: 1 / -1; text-align: left; }
      .teams { grid-template-columns: minmax(0, 1fr) 58px minmax(0, 1fr); gap: 6px; }
      .team { gap: 5px; }
      .team-name { font-size: 0.78rem; }
      .flag { width: 20px; height: 14px; }
      .score { font-size: 0.95rem; }
      .points-team { grid-template-columns: minmax(0, 70px) minmax(0, 1fr) auto; }
      .section-pills { overflow-x: auto; flex-wrap: nowrap; scrollbar-width: none; }
      .section-pills::-webkit-scrollbar { display: none; }
    }
  </style>
  <script src="ticker.js" defer></script>
  <script src="/nav-phase.js"></script>
</head>
<body>
<header>
  <div class="header-inner">
    <h1 class="logo">Picker<span>Game</span> 2026</h1>
    <nav>
      <a href="entry.html">Enter</a>
      <a href="entries.html">Entries</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="schedule.html" class="active">Matches</a>
      <a href="tables.html">Tables</a>
      <a href="countries.html">Countries</a>
      <a href="blog.html">Updates</a>
    </nav>
    <select class="nav-select" onchange="location.href=this.value" aria-label="Navigate">
      <option value="entry.html">Enter</option>
      <option value="entries.html">Entries</option>
      <option value="leaderboard.html">Leaderboard</option>
      <option value="schedule.html" selected>Matches</option>
      <option value="tables.html">Tables</option>
      <option value="countries.html">Countries</option>
      <option value="blog.html">Updates</option>
    </select>
  </div>
</header>

<!-- Sticky controls bar -->
<div class="controls-bar" id="controlsBar">
  <div class="controls-inner">
    <div class="controls-left">
      <div class="group-toggle" aria-label="Group matches by">
        <button class="group-toggle-btn active" id="groupByRoundBtn" type="button">By round</button>
        <button class="group-toggle-btn" id="groupByGroupBtn" type="button">By group</button>
      </div>
      <select class="date-select" id="dateSelect" aria-label="Jump to date">
        <option value="">Jump to date…</option>
      </select>
    </div>
    <div class="section-pills" id="sectionPills"></div>
  </div>
</div>

<main class="container">
  <div class="page-header">
    <h1>Matches</h1>
    <p>Fixtures, results, cards, penalties and PickerGame points by match.</p>
    <span class="time-badge">All times shown in BST</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div id="matchesRoot">
    <div class="loading">Loading matches...</div>
  </div>
</main>

<script>
  const DATA_URLS = {
    teams: './Data/teams.json',
    matches: './Data/matches.json',
    results: '/api/results',
    settings: './Data/settings.json',
    predictions: './Data/predictions.json'
  };

  const ROUND_ORDER = ['GS1', 'GS2', 'GS3', 'R32', 'R16', 'QF', 'SF', 'TPP', 'F'];
  const GROUP_ORDER = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
  const ROUND_PILL_LABELS = {
    GS1: 'Group 1', GS2: 'Group 2', GS3: 'Group 3',
    R32: 'R32', R16: 'R16', QF: 'QF', SF: 'SF', TPP: '3rd Place', F: 'Final'
  };

  const matchesRoot  = document.getElementById('matchesRoot');
  const errorMsg     = document.getElementById('errorMsg');
  const groupByRoundBtn = document.getElementById('groupByRoundBtn');
  const groupByGroupBtn = document.getElementById('groupByGroupBtn');
  const sectionPills = document.getElementById('sectionPills');
  const dateSelect   = document.getElementById('dateSelect');
  const controlsBar  = document.getElementById('controlsBar');

  let teams       = [];
  let matches     = [];
  let results     = [];
  let settings    = {};
  let predictions = {};
  let groupMode = 'round';

  async function loadJson(url) {
    const response = await fetch(`${url}?v=${Date.now()}`);
    if (!response.ok) throw new Error(`Could not load ${url}`);
    return response.json();
  }

  async function loadJsonWithFallback(primaryUrl, fallbackUrl) {
    try {
      const response = await fetch(`${primaryUrl}?v=${Date.now()}`);
      if (response.ok) return response.json();
    } catch (_) {}
    return loadJson(fallbackUrl);
  }

  async function loadData() {
    try {
      [teams, matches, results, settings, predictions] = await Promise.all([
        loadJson(DATA_URLS.teams),
        loadJson(DATA_URLS.matches),
        loadJsonWithFallback(DATA_URLS.results, './Data/results.json'),
        loadJson(DATA_URLS.settings),
        loadJson(DATA_URLS.predictions).catch(() => ({}))
      ]);
      return true;
    } catch (error) {
      showError(error.message);
      return false;
    }
  }

  function showError(message) {
    errorMsg.textContent = message;
    errorMsg.classList.add('show');
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[char]));
  }

  function getTeam(teamRef) {
    return teams.find(team => team.groupId === teamRef || team.countryName === teamRef);
  }

  function getTeamName(teamRef) {
    return getTeam(teamRef)?.countryName || teamRef || 'TBA';
  }

  function getResult(matchId) {
    if (!matchId || !Array.isArray(results)) return null;
    return results.find(result => result && result.matchId === matchId) || null;
  }

  function isPlayed(result) {
    return Boolean(result && result.homeScore !== null && result.awayScore !== null);
  }

  function getDisplayResult(match) {
    if (!match) return null;
    return match.result || getResult(match.matchId) || null;
  }

  function toBSTDateKey(isoDate) {
    return new Intl.DateTimeFormat('en-CA', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      timeZone: 'Europe/London'
    }).format(new Date(isoDate));
  }

  function formatDateLabel(isoDate) {
    return new Intl.DateTimeFormat('en-GB', {
      weekday: 'short', day: 'numeric', month: 'short',
      timeZone: 'Europe/London'
    }).format(new Date(isoDate)).replace(',', '');
  }

  function formatDateParts(isoDate) {
    const date = new Date(isoDate);
    return {
      day: new Intl.DateTimeFormat('en-GB', {
        weekday: 'short', day: '2-digit', month: 'short',
        timeZone: 'Europe/London'
      }).format(date),
      time: new Intl.DateTimeFormat('en-GB', {
        hour: '2-digit', minute: '2-digit', hourCycle: 'h23',
        timeZone: 'Europe/London'
      }).format(date)
    };
  }

  function scrollToEl(el) {
    if (!el) return;
    const offset = 58 + (controlsBar?.offsetHeight || 0) + 8;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
  }

  function renderFlag(teamRef, side) {
    const team = getTeam(teamRef);
    if (!team?.flagUrl) {
      return `<span class="flag placeholder" aria-label="${escapeHtml(side)} team flag">?</span>`;
    }
    return `<img class="flag" src="${team.flagUrl}" alt="${escapeHtml(team.countryName)} flag" loading="lazy" />`;
  }

  function getResultType(goalsFor, goalsAgainst, penaltiesFor, penaltiesAgainst, roundCode) {
    if (goalsFor > goalsAgainst) return 'win';
    if (goalsFor < goalsAgainst) return 'loss';
    if (!roundCode.includes('GS') && penaltiesFor !== null && penaltiesAgainst !== null) {
      return penaltiesFor > penaltiesAgainst ? 'win' : 'loss';
    }
    return 'draw';
  }

  function calculateSidePoints(match, result, side) {
    const isHome = side === 'home';
    const goalsFor      = isHome ? result.homeScore    : result.awayScore;
    const goalsAgainst  = isHome ? result.awayScore    : result.homeScore;
    const penaltiesFor  = isHome ? result.homePenalties : result.awayPenalties;
    const penaltiesAgainst = isHome ? result.awayPenalties : result.homePenalties;
    const yellowCards   = isHome ? result.homeYellow   : result.awayYellow;
    const redCards      = isHome ? result.homeRed      : result.awayRed;
    const qualified     = isHome ? result.homeQualified : result.awayQualified;
    const pointRules    = settings.points || {};
    const items = [];
    const addItem = (label, value) => { if (!value) return; items.push({ label, value }); };

    const resultType = getResultType(goalsFor, goalsAgainst, penaltiesFor, penaltiesAgainst, match.roundCode);
    if (resultType === 'win')  addItem('Win',  pointRules.win  || 0);
    if (resultType === 'draw') addItem('Draw', pointRules.draw || 0);

    addItem('GF', goalsFor      * (pointRules.goalScored   || 0));
    addItem('GA', goalsAgainst  * (pointRules.goalConceded || 0));
    addItem('YC', (yellowCards || 0) * (pointRules.yellowCard || 0));
    addItem('RC', (redCards    || 0) * (pointRules.redCard   || 0));

    if (qualified) {
      if (['GS1','GS2','GS3'].includes(match.roundCode)) {
        addItem('Qual', pointRules.qualifyKnockout || 0);
      } else if (match.roundCode !== 'F') {
        addItem('Advance', pointRules.qualifyNextRound || 0);
      }
    }
    if (match.roundCode === 'F' && resultType === 'win') {
      addItem('Final', pointRules.winFinal || 0);
    }

    const total = items.reduce((sum, item) => sum + item.value, 0);
    return { items, total };
  }

  function renderPointChips(items) {
    if (!items.length) return '<span class="point-chip">0</span>';
    return items.map(item => `
      <span class="point-chip ${item.value < 0 ? 'negative' : 'positive'}">
        <span>${escapeHtml(item.label)}</span>
        <strong>${item.value > 0 ? '+' : ''}${item.value}</strong>
      </span>
    `).join('');
  }

  function renderPointsPanel(match, result) {
    if (!isPlayed(result)) {
      return '<div class="points-panel"><div class="points-empty">PickerGame points appear here once the match is played.</div></div>';
    }
    const home = match.pickerGamePoints?.home || calculateSidePoints(match, result, 'home');
    const away = match.pickerGamePoints?.away || calculateSidePoints(match, result, 'away');
    const matchTotal = match.pickerGamePoints?.total ?? (home.total + away.total);
    return `
      <div class="points-panel">
        <div class="points-title">
          <span>PickerGame points</span>
          <span class="points-total">${matchTotal > 0 ? '+' : ''}${matchTotal} total</span>
        </div>
        ${renderPointsTeam(getTeamName(match.homeTeam), home)}
        ${renderPointsTeam(getTeamName(match.awayTeam), away)}
      </div>
    `;
  }

  function renderPointsTeam(teamName, points) {
    return `
      <div class="points-team">
        <div class="points-team-name" title="${escapeHtml(teamName)}">${escapeHtml(teamName)}</div>
        <div class="point-chips">${renderPointChips(points.items)}</div>
        <div class="team-point-total">${points.total > 0 ? '+' : ''}${points.total}</div>
      </div>
    `;
  }

  function renderScoreline(match, result) {
    if (!isPlayed(result)) {
      return '<div class="scoreline"><div class="score pending">v</div></div>';
    }
    const hasPenalties = result.homePenalties !== null && result.awayPenalties !== null;
    return `
      <div class="scoreline">
        <div class="score">${result.homeScore} - ${result.awayScore}</div>
        ${hasPenalties ? `<div class="penalties">Pens ${result.homePenalties} - ${result.awayPenalties}</div>` : ''}
      </div>
    `;
  }

  function renderTeamCards(result, side) {
    if (!isPlayed(result)) return '';
    const yellow = side === 'home' ? (result.homeYellow || 0) : (result.awayYellow || 0);
    const red    = side === 'home' ? (result.homeRed    || 0) : (result.awayRed    || 0);
    if (!yellow && !red) return '';
    const parts = [];
    if (yellow) parts.push(`
      <span class="card-note yellow" title="${yellow} yellow card${yellow !== 1 ? 's' : ''}">
        ${Array.from({ length: yellow }, () => '<span class="card-square yellow"></span>').join('')}
        <span>${yellow}</span>
      </span>
    `);
    if (red) parts.push(`
      <span class="card-note red" title="${red} red card${red !== 1 ? 's' : ''}">
        ${Array.from({ length: red }, () => '<span class="card-square red"></span>').join('')}
        <span>${red}</span>
      </span>
    `);
    return `<div class="team-cards">${parts.join('')}</div>`;
  }

  function renderMatch(match) {
    if (!match) return '';
    const result     = getDisplayResult(match);
    const dateParts  = formatDateParts(match.date);
    const dateKey    = toBSTDateKey(match.date);
    const playedClass = isPlayed(result) ? ' played' : '';
    return `
      <article class="match-card${playedClass}" data-date="${escapeHtml(dateKey)}">
        <div class="match-meta">
          <div>
            <div class="match-date">${escapeHtml(dateParts.day)}</div>
            <div class="match-time">${escapeHtml(dateParts.time)} BST</div>
          </div>
          <div class="match-location">${escapeHtml(match.location)}</div>
          ${predictions[match.matchId] ? `<div class="match-prediction">El Presidente: <strong>${escapeHtml(predictions[match.matchId])}</strong></div>` : ''}
        </div>
        <div class="match-main">
          <div class="teams">
            <div class="team home">
              <div class="team-identity">
                ${renderFlag(match.homeTeam, 'Home')}
                <span class="team-name" title="${escapeHtml(getTeamName(match.homeTeam))}">${escapeHtml(getTeamName(match.homeTeam))}</span>
              </div>
              ${renderTeamCards(result, 'home')}
            </div>
            ${renderScoreline(match, result)}
            <div class="team away">
              <div class="team-identity">
                <span class="team-name" title="${escapeHtml(getTeamName(match.awayTeam))}">${escapeHtml(getTeamName(match.awayTeam))}</span>
                ${renderFlag(match.awayTeam, 'Away')}
              </div>
              ${renderTeamCards(result, 'away')}
            </div>
          </div>
        </div>
        ${renderPointsPanel(match, result)}
      </article>
    `;
  }

  function sortByKickoff(a, b) { return new Date(a.date) - new Date(b.date); }

  function groupMatchesByRound() {
    const sorted = [...matches].sort((a, b) => {
      const roundDiff = ROUND_ORDER.indexOf(a.roundCode) - ROUND_ORDER.indexOf(b.roundCode);
      return roundDiff !== 0 ? roundDiff : sortByKickoff(a, b);
    });
    return sorted.filter(Boolean).reduce((groups, match) => {
      const key = match.roundCode || match.round;
      if (!groups.has(key)) groups.set(key, { title: match.round || key, matches: [] });
      groups.get(key).matches.push(match);
      return groups;
    }, new Map());
  }

  function getMatchGroup(match) {
    if (!match.roundCode?.includes('GS')) return { key: 'KO', title: 'Knockout matches' };
    const homeGroup = getTeam(match.homeTeam)?.group;
    const awayGroup = getTeam(match.awayTeam)?.group;
    const group = homeGroup || awayGroup;
    return group ? { key: group, title: `Group ${group}` } : { key: 'TBA', title: 'Group TBA' };
  }

  function groupMatchesByGroup() {
    const sorted = [...matches].filter(Boolean).sort((a, b) => {
      const aGroup = getMatchGroup(a).key;
      const bGroup = getMatchGroup(b).key;
      const aIndex = GROUP_ORDER.includes(aGroup) ? GROUP_ORDER.indexOf(aGroup) : GROUP_ORDER.length;
      const bIndex = GROUP_ORDER.includes(bGroup) ? GROUP_ORDER.indexOf(bGroup) : GROUP_ORDER.length;
      return aIndex !== bIndex ? aIndex - bIndex : sortByKickoff(a, b);
    });
    return sorted.reduce((groups, match) => {
      const matchGroup = getMatchGroup(match);
      if (!groups.has(matchGroup.key)) groups.set(matchGroup.key, { title: matchGroup.title, matches: [] });
      groups.get(matchGroup.key).matches.push(match);
      return groups;
    }, new Map());
  }

  function buildSectionPills(groups) {
    sectionPills.innerHTML = Array.from(groups.keys()).map(key => {
      const label = groupMode === 'round'
        ? (ROUND_PILL_LABELS[key] || key)
        : (key === 'KO' ? 'Knockout' : key);
      return `<button class="section-pill" data-section="${escapeHtml(key)}">${escapeHtml(label)}</button>`;
    }).join('');
  }

  function buildDateSelect() {
    const STAGE_GROUPS = [
      { label: 'Group Stage 1', codes: ['GS1'] },
      { label: 'Group Stage 2', codes: ['GS2'] },
      { label: 'Group Stage 3', codes: ['GS3'] },
      { label: 'Knockout',      codes: ['R32', 'R16', 'QF', 'SF', 'TPP', 'F'] },
    ];
    let html = '<option value="">Jump to date…</option>';
    for (const stage of STAGE_GROUPS) {
      const dates = new Map();
      matches
        .filter(m => stage.codes.includes(m.roundCode))
        .sort(sortByKickoff)
        .forEach(m => {
          const key = toBSTDateKey(m.date);
          if (!dates.has(key)) dates.set(key, formatDateLabel(m.date));
        });
      if (!dates.size) continue;
      html += `<optgroup label="${escapeHtml(stage.label)}">`;
      dates.forEach((label, key) => {
        html += `<option value="${escapeHtml(key)}">${escapeHtml(label)}</option>`;
      });
      html += '</optgroup>';
    }
    dateSelect.innerHTML = html;
  }

  function updateGroupButtons() {
    groupByRoundBtn.classList.toggle('active', groupMode === 'round');
    groupByGroupBtn.classList.toggle('active', groupMode === 'group');
  }

  function isGroupComplete(groupMatches) {
    return groupMatches.length > 0 && groupMatches.every(m => isPlayed(getDisplayResult(m)));
  }

  function renderMatches() {
    const groups = groupMode === 'round' ? groupMatchesByRound() : groupMatchesByGroup();
    matchesRoot.innerHTML = Array.from(groups.entries()).map(([key, group]) => {
      const complete    = isGroupComplete(group.matches);
      const playedCount = group.matches.filter(m => isPlayed(getDisplayResult(m))).length;
      const countLabel  = complete
        ? `${group.matches.length} matches · complete`
        : playedCount > 0
          ? `${playedCount}/${group.matches.length} played`
          : `${group.matches.length} matches`;
      return `
        <section class="round-section${complete ? ' collapsed' : ''}" data-section-id="${escapeHtml(key)}">
          <div class="round-heading">
            <h2>${escapeHtml(group.title)}</h2>
            <div class="round-heading-right">
              <span class="round-count">${escapeHtml(countLabel)}</span>
              <span class="round-toggle">▾</span>
            </div>
          </div>
          ${group.matches.map(renderMatch).join('')}
        </section>
      `;
    }).join('');
    buildSectionPills(groups);
  }

  // Scroll to a section when a pill is clicked
  sectionPills.addEventListener('click', e => {
    const pill = e.target.closest('.section-pill');
    if (!pill) return;
    const section = matchesRoot.querySelector(`[data-section-id="${pill.dataset.section}"]`);
    if (!section) return;
    if (section.classList.contains('collapsed')) section.classList.remove('collapsed');
    scrollToEl(section);
  });

  // Scroll to a date when selected
  dateSelect.addEventListener('change', e => {
    const dateKey = e.target.value;
    if (!dateKey) return;
    const card = matchesRoot.querySelector(`[data-date="${dateKey}"]`);
    if (!card) return;
    const section = card.closest('.round-section');
    if (section?.classList.contains('collapsed')) section.classList.remove('collapsed');
    scrollToEl(card);
    e.target.value = '';
  });

  // Expand/collapse sections
  matchesRoot.addEventListener('click', e => {
    const heading = e.target.closest('.round-heading');
    if (heading) heading.closest('.round-section').classList.toggle('collapsed');
  });

  groupByRoundBtn.addEventListener('click', () => {
    groupMode = 'round';
    updateGroupButtons();
    renderMatches();
  });

  groupByGroupBtn.addEventListener('click', () => {
    groupMode = 'group';
    updateGroupButtons();
    renderMatches();
  });

  async function init() {
    updateGroupButtons();
    if (await loadData()) {
      buildDateSelect();
      renderMatches();
    }
  }

  init();
</script>
</body>
</html>
