<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Scores - Picker Game 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
  <style>
    :root {
      --navy:       #1a3352;
      --navy-light: #2d5a8e;
      --gold:       #e86f2c;
      --green:      #22a861;
      --green-bg:   #e4f7eb;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --amber:      #c86b2c;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --white:      #ffffff;
      --radius:     10px;
      --shadow-md:  0 4px 16px rgba(0,0,0,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 15px;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    header {
      background:
        linear-gradient(135deg, #1a3352 0%, #1e4070 100%);
      color: var(--white);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 10px rgba(11,79,47,0.24);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }
    .logo { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 0; }
    .logo span { color: var(--gold); }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover,
    nav a.active { color: var(--white); }
    .nav-select {
      display: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .nav-select option { color: #000; }
    @media (max-width: 768px) {
      nav { display: none; }
      .nav-select { display: block; }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-end;
      margin-bottom: 18px;
    }
    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .page-header p {
      color: var(--gray-600);
      margin: 0;
      font-size: 0.95rem;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .expand-btn {
      display: none;
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--navy);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 7px 14px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .expand-btn:hover { border-color: var(--navy-light); }
    .expand-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
    @media (min-width: 769px) { .expand-btn { display: inline-block; } }

    .error-msg {
      display: none;
      padding: 12px 14px;
      border: 1.5px solid var(--red);
      border-radius: var(--radius);
      background: var(--red-bg);
      color: var(--red);
      font-weight: 700;
      margin-bottom: 14px;
    }
    .error-msg.show { display: block; }

    .scores-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .table-wrap {
      overflow-x: auto;
      overflow-y: auto;
      max-height: calc(100vh - 200px);
      min-height: 300px;
    }
    table {
      width: 100%;
      min-width: 1060px;
      border-collapse: collapse;
    }
    thead {
      background: var(--navy);
      color: var(--white);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    th {
      padding: 10px 8px;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }
    th.country-heading { text-align: left; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: var(--navy-light); }
    th.sort-active { background: var(--navy-light); }
    .sort-arrow { margin-left: 2px; font-size: 0.62rem; }
    .sort-arrow-inactive { opacity: 0.22; }
    .round-col-active-head { background: rgba(255,255,255,0.16) !important; }
    .round-active-marker { display: block; width: 5px; height: 5px; background: var(--gold); border-radius: 50%; margin: 2px auto 0; }
    .round-col-active-cell { background: rgba(233,111,44,0.07); }
    .country-stats { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
    .stat-item { font-size: 0.6rem; font-weight: 800; color: var(--gray-600); background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 3px; padding: 1px 5px; }
    .stat-yc { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
    .stat-rc { background: var(--red-bg); color: var(--red); border-color: #fecaca; }
    .team-row[data-country] { cursor: pointer; }
    .team-row.row-open { background: #eef3f8; }
    tbody tr.team-row {
      border-bottom: 1px solid var(--gray-200);
    }
    tbody tr.team-row:hover {
      background: var(--gray-50);
    }
    td {
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }
    .country-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 220px;
      text-align: left;
    }
    .flag {
      width: 26px;
      height: 18px;
      border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.08);
      object-fit: cover;
      background: var(--gray-100);
      flex: 0 0 auto;
    }
    .country-name {
      color: var(--navy);
      font-size: 0.88rem;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .country-meta {
      color: var(--gray-600);
      font-size: 0.68rem;
      font-weight: 700;
    }
    .rank-cell {
      color: var(--gray-600);
      font-size: 0.78rem;
      font-weight: 800;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      border-radius: 99px;
      border: 1px solid var(--gray-200);
      background: var(--green-bg);
      color: var(--navy);
      font-size: 0.68rem;
      font-weight: 900;
      padding: 3px 7px;
    }
    .status-pill.out {
      background: var(--gray-100);
      color: var(--gray-600);
    }
    .round-score-btn {
      width: 42px;
      border: 1px solid transparent;
      border-radius: 99px;
      background: transparent;
      color: var(--gray-600);
      cursor: pointer;
      font-weight: 900;
      padding: 4px 0;
    }
    .round-score-btn.has-score {
      border-color: var(--gray-200);
      background: var(--green-bg);
      color: var(--navy);
    }
    .round-score-btn.active {
      border-color: var(--navy-light);
      background: var(--navy);
      color: var(--white);
    }
    .total-cell {
      color: var(--green);
      font-size: 0.95rem;
      font-weight: 900;
    }
    .details-row td {
      padding: 0;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      text-align: left;
    }
    .round-detail {
      padding: 12px 14px;
    }
    .round-detail-title {
      color: var(--navy);
      font-size: 0.82rem;
      font-weight: 900;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .breakdown-list {
      display: grid;
      gap: 8px;
    }
    .breakdown-match {
      display: grid;
      grid-template-columns: minmax(190px, 0.8fr) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      background: var(--white);
    }
    .breakdown-fixture {
      color: var(--navy);
      font-size: 0.76rem;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .breakdown-date {
      color: var(--gray-600);
      font-size: 0.68rem;
      font-weight: 700;
      margin-top: 2px;
    }
    .point-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .point-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--gray-600);
      font-size: 0.66rem;
      font-weight: 800;
      line-height: 1;
      padding: 3px 6px;
    }
    .point-chip.positive {
      background: var(--green-bg);
      color: var(--navy);
    }
    .point-chip.negative {
      background: var(--red-bg);
      color: var(--red);
    }
    .breakdown-total {
      color: var(--green);
      font-size: 0.9rem;
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
    }
    .empty-breakdown {
      color: var(--gray-600);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 8px;
      border: 1px dashed var(--gray-200);
      border-radius: var(--radius);
      background: var(--white);
    }
    .loading {
      padding: 28px 14px;
      color: var(--gray-600);
      text-align: center;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      header { padding: 0 14px; }
      nav a {
        margin-left: 12px;
        font-size: 0.82rem;
      }
      .container {
        padding: 18px 10px;
      }
      .page-header {
        display: block;
      }
      .page-header h1 {
        font-size: 1.45rem;
      }
      .controls {
        margin-top: 12px;
      }
      .breakdown-match {
        grid-template-columns: 1fr auto;
      }
      .point-chips {
        grid-column: 1 / -1;
        order: 3;
      }
    }
  </style>
  <script src="ticker.js" defer></script>
  <script src="/nav-phase.js"></script>
</head>
<body>
<header>
  <div class="header-inner">
    <h1 class="logo">Picker<span>Game</span> 2026</h1>
    <nav>
      <a href="entry.html">Enter</a>
      <a href="entries.html">Entries</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="schedule.html">Matches</a>
      <a href="match-reports.html">Match reports</a>
      <a href="tables.html">Tables</a>
      <a href="countries.html" class="active">Countries</a>
      <a href="blog.html">Updates</a>
    </nav>
    <select class="nav-select" onchange="location.href=this.value" aria-label="Navigate">
      <option value="entry.html">Enter</option>
      <option value="entries.html">Entries</option>
      <option value="leaderboard.html">Leaderboard</option>
      <option value="schedule.html">Matches</option>
      <option value="match-reports.html">Match reports</option>
      <option value="tables.html">Tables</option>
      <option value="countries.html" selected>Countries</option>
      <option value="blog.html">Updates</option>
    </select>
  </div>
</header>

<main class="container">
  <div class="page-header">
    <div>
      <h1>Country Scores</h1>
      <p>Scores by country and round. Click any round score to inspect the point breakdown.</p>
    </div>
    <div class="controls">
      <button class="expand-btn" id="expandBtn" type="button">Expand</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="scores-card">
    <div class="table-wrap" id="scoresRoot">
      <div class="loading">Loading country scores...</div>
    </div>
  </div>
</main>

<script>
  const DATA_URLS   = { teams: './Data/teams.json' };
  const ROUND_ORDER = ['GS1','GS2','GS3','R32','R16','QF','SF','TPP','F'];
  const ROUND_LABELS = {
    GS1:'Group Stage 1', GS2:'Group Stage 2', GS3:'Group Stage 3',
    R32:'Round of 32',   R16:'Round of 16',   QF:'Quarter-finals',
    SF:'Semi-finals',    TPP:'Third Place',    F:'Final'
  };

  // Country + Status + FIFA + Cost + Cost/pt + Pld + rounds + Total
  const TOTAL_COLS = ROUND_ORDER.length + 7;

  const scoresRoot = document.getElementById('scoresRoot');
  const errorMsg   = document.getElementById('errorMsg');
  const expandBtn  = document.getElementById('expandBtn');

  let countryScores = [];
  let openDetail    = null;   // { countryName, round } | null
  let sortField     = 'score';
  let sortDir       = 'desc';
  let expandedMode  = false;
  let activeRound   = null;

  // Columns where ascending order is the natural default
  const DEFAULT_ASC = new Set(['name', 'fifaRank', 'costPerPoint', 'status']);

  async function loadJson(url) {
    const res = await fetch(`${url}?v=${Date.now()}`);
    if (!res.ok) throw new Error(`Could not load ${url}`);
    return res.json();
  }

  async function loadData() {
    try {
      countryScores = (await loadJson(DATA_URLS.teams)).map(normaliseTeamScore);
      return true;
    } catch (e) {
      errorMsg.textContent = e.message;
      errorMsg.classList.add('show');
      return false;
    }
  }

  function escapeHtml(v) {
    return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
  }

  function formatDate(iso) {
    return new Intl.DateTimeFormat('en-GB', {
      weekday:'short', day:'2-digit', month:'short',
      hour:'2-digit', minute:'2-digit', hourCycle:'h23', timeZone:'Europe/London'
    }).format(new Date(iso));
  }

  function getCurrentRound() {
    for (let i = ROUND_ORDER.length - 1; i >= 0; i--) {
      if (countryScores.some(c => (c.byRound[ROUND_ORDER[i]] || 0) > 0)) return ROUND_ORDER[i];
    }
    return ROUND_ORDER[0];
  }

  function getSortedScores() {
    return [...countryScores].sort((a, b) => {
      let av, bv;
      switch (sortField) {
        case 'name':         av = a.countryName; bv = b.countryName; break;
        case 'status':       av = a.inCompetition ? 0 : 1; bv = b.inCompetition ? 0 : 1; break;
        case 'fifaRank':     av = a.fifaRank || 999; bv = b.fifaRank || 999; break;
        case 'cost':         av = a.cost || 0; bv = b.cost || 0; break;
        case 'costPerPoint': av = a.totalPoints > 0 ? a.cost/a.totalPoints : Infinity;
                             bv = b.totalPoints > 0 ? b.cost/b.totalPoints : Infinity; break;
        case 'pld':          av = a.matchesPlayed; bv = b.matchesPlayed; break;
        case 'score':        av = a.totalPoints; bv = b.totalPoints; break;
        default:             av = a.byRound[sortField] || 0; bv = b.byRound[sortField] || 0;
      }
      let cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
      if (sortDir === 'desc') cmp = -cmp;
      if (cmp !== 0) return cmp;
      if (sortField !== 'score' && a.totalPoints !== b.totalPoints) return b.totalPoints - a.totalPoints;
      return a.countryName.localeCompare(b.countryName);
    });
  }

  function normaliseTeamScore(team) {
    const byRound = {}, detailsByRound = {};
    ROUND_ORDER.forEach(r => { byRound[r] = 0; detailsByRound[r] = []; });

    (team.scoresByRound || []).forEach(rs => {
      byRound[rs.roundCode] = rs.total || 0;
      detailsByRound[rs.roundCode] = (rs.matches || []).map(m => ({
        matchId: m.matchId, date: m.date || '', roundCode: rs.roundCode,
        fixture: m.fixture, points: { items: m.points || [], total: m.total || 0 }
      }));
    });

    const allMatches = (team.scoresByRound || []).flatMap(r => r.matches || []);
    return {
      ...team,
      totalPoints:    team.totalPoints || 0,
      inCompetition:  team.inCompetition !== false,
      matchesPlayed:  allMatches.length,
      byRound, detailsByRound,
      wins:   allMatches.filter(m => m.result === 'win').length,
      draws:  allMatches.filter(m => m.result === 'draw').length,
      losses: allMatches.filter(m => m.result === 'loss').length,
      gf: allMatches.reduce((s, m) => s + (m.goalsFor      || 0), 0),
      ga: allMatches.reduce((s, m) => s + (m.goalsAgainst  || 0), 0),
      yc: allMatches.reduce((s, m) => s + (m.yellowCards   || 0), 0),
      rc: allMatches.reduce((s, m) => s + (m.redCards      || 0), 0),
    };
  }

  function renderPointChips(items) {
    if (!items.length) return '<span class="point-chip">0</span>';
    return items.map(item => `
      <span class="point-chip ${item.value < 0 ? 'negative' : 'positive'}">
        <span>${escapeHtml(item.label)}</span>
        <strong>${item.value > 0 ? '+' : ''}${item.value}</strong>
      </span>`).join('');
  }

  function renderRoundDetail(country, round) {
    const details = country.detailsByRound[round] || [];
    return `
      <tr class="details-row">
        <td colspan="${TOTAL_COLS}">
          <div class="round-detail">
            <div class="round-detail-title">${escapeHtml(country.countryName)} — ${escapeHtml(ROUND_LABELS[round] || round)}</div>
            ${details.length ? `
              <div class="breakdown-list">
                ${details.map(d => `
                  <div class="breakdown-match">
                    <div>
                      <div class="breakdown-fixture" title="${escapeHtml(d.fixture)}">${escapeHtml(d.fixture)}</div>
                      <div class="breakdown-date">${d.date ? `${escapeHtml(formatDate(d.date))} BST` : escapeHtml(d.matchId)}</div>
                    </div>
                    <div class="point-chips">${renderPointChips(d.points.items)}</div>
                    <div class="breakdown-total">${d.points.total > 0 ? '+' : ''}${d.points.total}</div>
                  </div>`).join('')}
              </div>`
            : '<div class="empty-breakdown">No played matches or points recorded for this round yet.</div>'}
          </div>
        </td>
      </tr>`;
  }

  function arrow(field) {
    if (sortField !== field) return '<span class="sort-arrow sort-arrow-inactive">↕</span>';
    return `<span class="sort-arrow">${sortDir === 'asc' ? '↑' : '↓'}</span>`;
  }

  function th(field, label, extraClass) {
    const cls = ['sortable', sortField === field ? 'sort-active' : '', extraClass || ''].filter(Boolean).join(' ');
    return `<th class="${cls}" data-sort="${field}">${escapeHtml(label)}${arrow(field)}</th>`;
  }

  function renderTable() {
    const rows = getSortedScores();
    scoresRoot.innerHTML = `
      <table>
        <thead>
          <tr>
            ${th('name',         'Country',  'country-heading')}
            ${th('status',       'Status')}
            ${th('fifaRank',     'FIFA')}
            ${th('cost',         'Cost')}
            ${th('costPerPoint', 'Cost/pt')}
            ${th('pld',          'Pld')}
            ${ROUND_ORDER.map(r => {
              const isActive = r === activeRound;
              const cls = ['sortable',
                sortField === r ? 'sort-active' : '',
                isActive ? 'round-col-active-head' : ''
              ].filter(Boolean).join(' ');
              return `<th class="${cls}" data-sort="${r}" data-round="${r}"
                title="${escapeHtml(ROUND_LABELS[r])}">${escapeHtml(r)}${arrow(r)}${isActive ? '<span class="round-active-marker"></span>' : ''}</th>`;
            }).join('')}
            ${th('score', 'Total')}
          </tr>
        </thead>
        <tbody>
          ${rows.map(country => {
            const isOpen  = openDetail && openDetail.countryName === country.countryName;
            const openRnd = isOpen ? openDetail.round : null;
            const costPt  = country.cost != null && country.totalPoints > 0
              ? `MX$${(country.cost / country.totalPoints).toFixed(1)}bn` : '—';

            const statsHtml = expandedMode ? `
              <div class="country-stats">
                <span class="stat-item">W${country.wins}</span>
                <span class="stat-item">D${country.draws}</span>
                <span class="stat-item">L${country.losses}</span>
                <span class="stat-item">GF${country.gf}</span>
                <span class="stat-item">GA${country.ga}</span>
                ${country.yc ? `<span class="stat-item stat-yc">YC${country.yc}</span>` : ''}
                ${country.rc ? `<span class="stat-item stat-rc">RC${country.rc}</span>` : ''}
              </div>` : '';

            return `
              <tr class="team-row${isOpen ? ' row-open' : ''}" ${expandedMode ? `data-country="${escapeHtml(country.countryName)}"` : ''}>
                <td>
                  <div class="country-cell">
                    <img class="flag" src="${country.flagUrl}" alt="${escapeHtml(country.countryName)} flag" loading="lazy" />
                    <div>
                      <div class="country-name" title="${escapeHtml(country.countryName)}">${escapeHtml(country.countryName)}</div>
                      <div class="country-meta">Group ${escapeHtml(country.group)}</div>
                      ${statsHtml}
                    </div>
                  </div>
                </td>
                <td><span class="status-pill ${country.inCompetition ? '' : 'out'}">${country.inCompetition ? 'In' : 'Out'}</span></td>
                <td class="rank-cell">${country.fifaRank || '—'}</td>
                <td class="rank-cell">${country.cost != null ? `MX$${country.cost}bn` : '—'}</td>
                <td class="rank-cell">${costPt}</td>
                <td class="rank-cell">${country.matchesPlayed}</td>
                ${ROUND_ORDER.map(r => {
                  const score    = country.byRound[r] || 0;
                  const cellOpen = openRnd === r;
                  const colCls   = r === activeRound ? 'round-col-active-cell' : '';
                  return `<td class="${colCls}">
                    <button class="round-score-btn ${score ? 'has-score' : ''} ${cellOpen ? 'active' : ''}"
                      type="button" data-country="${escapeHtml(country.countryName)}" data-round="${escapeHtml(r)}"
                      title="${escapeHtml(country.countryName)} — ${escapeHtml(ROUND_LABELS[r])}">${score}</button>
                  </td>`;
                }).join('')}
                <td class="total-cell">${country.totalPoints}</td>
              </tr>
              ${isOpen ? renderRoundDetail(country, openRnd) : ''}`;
          }).join('')}
        </tbody>
      </table>`;

    // Column header sort + active-round clicks
    scoresRoot.querySelectorAll('th[data-sort]').forEach(el => {
      el.addEventListener('click', () => {
        const field = el.dataset.sort;
        const isRound = ROUND_ORDER.includes(field);

        if (expandedMode && isRound) {
          // In expanded mode, round headers change the highlighted column
          activeRound = field;
          if (openDetail) openDetail = { countryName: openDetail.countryName, round: field };
          renderTable();
          return;
        }

        if (sortField === field) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortField = field;
          sortDir = DEFAULT_ASC.has(field) ? 'asc' : 'desc';
        }
        openDetail = null;
        renderTable();
      });
    });

    // Round score button clicks
    scoresRoot.querySelectorAll('.round-score-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const name  = btn.dataset.country;
        const round = btn.dataset.round;
        if (expandedMode) activeRound = round;
        const same  = openDetail && openDetail.countryName === name && openDetail.round === round;
        openDetail  = same ? null : { countryName: name, round };
        renderTable();
      });
    });

    // In expanded mode, clicking a country row opens the detail for the active round
    if (expandedMode) {
      scoresRoot.querySelectorAll('.team-row[data-country]').forEach(row => {
        row.addEventListener('click', e => {
          if (e.target.closest('button')) return;
          const name = row.dataset.country;
          const same = openDetail && openDetail.countryName === name;
          openDetail = same ? null : { countryName: name, round: activeRound };
          renderTable();
        });
      });
    }
  }

  expandBtn.addEventListener('click', () => {
    expandedMode = !expandedMode;
    expandBtn.textContent = expandedMode ? 'Collapse' : 'Expand';
    expandBtn.classList.toggle('active', expandedMode);
    openDetail = null;
    if (expandedMode && !activeRound) activeRound = getCurrentRound();
    renderTable();
  });

  async function init() {
    if (await loadData()) {
      activeRound = getCurrentRound();
      renderTable();
    }
  }

  init();
</script>
</body>
</html>
