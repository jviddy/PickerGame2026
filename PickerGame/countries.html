<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Scores - Picker Game 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
  <style>
    :root {
      --navy:       #0b4f2f;
      --navy-light: #147a45;
      --gold:       #f2c94c;
      --green:      #22a861;
      --green-bg:   #e4f7eb;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --amber:      #c86b2c;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --white:      #ffffff;
      --radius:     10px;
      --shadow-md:  0 4px 16px rgba(0,0,0,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 15px;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    header {
      background: var(--navy);
      color: var(--white);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }
    .logo { margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: 0; }
    .logo span { color: var(--gold); }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover,
    nav a.active { color: var(--white); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-end;
      margin-bottom: 18px;
    }
    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .page-header p {
      color: var(--gray-600);
      margin: 0;
      font-size: 0.95rem;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .controls label {
      color: var(--gray-600);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }
    .sort-select {
      border: 1.5px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--navy);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 7px 12px;
    }

    .error-msg {
      display: none;
      padding: 12px 14px;
      border: 1.5px solid var(--red);
      border-radius: var(--radius);
      background: var(--red-bg);
      color: var(--red);
      font-weight: 700;
      margin-bottom: 14px;
    }
    .error-msg.show { display: block; }

    .scores-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
    }
    thead {
      background: var(--navy);
      color: var(--white);
    }
    th {
      padding: 10px 8px;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }
    th.country-heading {
      text-align: left;
    }
    tbody tr.team-row {
      border-bottom: 1px solid var(--gray-200);
    }
    tbody tr.team-row:hover {
      background: var(--gray-50);
    }
    td {
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }
    .country-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 220px;
      text-align: left;
    }
    .flag {
      width: 26px;
      height: 18px;
      border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.08);
      object-fit: cover;
      background: var(--gray-100);
      flex: 0 0 auto;
    }
    .country-name {
      color: var(--navy);
      font-size: 0.88rem;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .country-meta {
      color: var(--gray-600);
      font-size: 0.68rem;
      font-weight: 700;
    }
    .rank-cell {
      color: var(--gray-600);
      font-size: 0.78rem;
      font-weight: 800;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      border-radius: 99px;
      border: 1px solid var(--gray-200);
      background: var(--green-bg);
      color: var(--navy);
      font-size: 0.68rem;
      font-weight: 900;
      padding: 3px 7px;
    }
    .status-pill.out {
      background: var(--gray-100);
      color: var(--gray-600);
    }
    .round-score-btn {
      width: 42px;
      border: 1px solid transparent;
      border-radius: 99px;
      background: transparent;
      color: var(--gray-600);
      cursor: pointer;
      font-weight: 900;
      padding: 4px 0;
    }
    .round-score-btn.has-score {
      border-color: var(--gray-200);
      background: var(--green-bg);
      color: var(--navy);
    }
    .round-score-btn.active {
      border-color: var(--navy-light);
      background: var(--navy);
      color: var(--white);
    }
    .total-cell {
      color: var(--green);
      font-size: 0.95rem;
      font-weight: 900;
    }
    .details-row td {
      padding: 0;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      text-align: left;
    }
    .round-detail {
      padding: 12px 14px;
    }
    .round-detail-title {
      color: var(--navy);
      font-size: 0.82rem;
      font-weight: 900;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .breakdown-list {
      display: grid;
      gap: 8px;
    }
    .breakdown-match {
      display: grid;
      grid-template-columns: minmax(190px, 0.8fr) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      background: var(--white);
    }
    .breakdown-fixture {
      color: var(--navy);
      font-size: 0.76rem;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .breakdown-date {
      color: var(--gray-600);
      font-size: 0.68rem;
      font-weight: 700;
      margin-top: 2px;
    }
    .point-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .point-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      background: var(--white);
      color: var(--gray-600);
      font-size: 0.66rem;
      font-weight: 800;
      line-height: 1;
      padding: 3px 6px;
    }
    .point-chip.positive {
      background: var(--green-bg);
      color: var(--navy);
    }
    .point-chip.negative {
      background: var(--red-bg);
      color: var(--red);
    }
    .breakdown-total {
      color: var(--green);
      font-size: 0.9rem;
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
    }
    .empty-breakdown {
      color: var(--gray-600);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 8px;
      border: 1px dashed var(--gray-200);
      border-radius: var(--radius);
      background: var(--white);
    }
    .loading {
      padding: 28px 14px;
      color: var(--gray-600);
      text-align: center;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      header { padding: 0 14px; }
      nav a {
        margin-left: 12px;
        font-size: 0.82rem;
      }
      .container {
        padding: 18px 10px;
      }
      .page-header {
        display: block;
      }
      .page-header h1 {
        font-size: 1.45rem;
      }
      .controls {
        margin-top: 12px;
      }
      .breakdown-match {
        grid-template-columns: 1fr auto;
      }
      .point-chips {
        grid-column: 1 / -1;
        order: 3;
      }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1 class="logo">Picker<span>Game</span> 2026</h1>
    <nav>
      <a href="entry.html">Enter</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="schedule.html">Matches</a>
      <a href="countries.html" class="active">Countries</a>
    </nav>
  </div>
</header>

<main class="container">
  <div class="page-header">
    <div>
      <h1>Country Scores</h1>
      <p>Scores by country and round. Click any round score to inspect the point breakdown.</p>
    </div>
    <div class="controls">
      <label for="sortSelect">Order</label>
      <select class="sort-select" id="sortSelect">
        <option value="score">Current score</option>
        <option value="name">Country name</option>
        <option value="status">Still in competition</option>
      </select>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="scores-card">
    <div class="table-wrap" id="scoresRoot">
      <div class="loading">Loading country scores...</div>
    </div>
  </div>
</main>

<script>
  const DATA_URLS = {
    countryScores: './Data/countryScores.json'
  };

  const ROUND_ORDER = ['GS1', 'GS2', 'GS3', 'R32', 'R16', 'QF', 'SF', 'TPP', 'F'];
  const ROUND_LABELS = {
    GS1: 'Group Stage 1',
    GS2: 'Group Stage 2',
    GS3: 'Group Stage 3',
    R32: 'Round of 32',
    R16: 'Round of 16',
    QF: 'Quarter-finals',
    SF: 'Semi-finals',
    TPP: 'Third Place',
    F: 'Final'
  };

  const scoresRoot = document.getElementById('scoresRoot');
  const errorMsg = document.getElementById('errorMsg');
  const sortSelect = document.getElementById('sortSelect');

  let countryScores = [];
  let openDetail = null;

  async function loadJson(url) {
    const response = await fetch(`${url}?v=${Date.now()}`);
    if (!response.ok) throw new Error(`Could not load ${url}`);
    return response.json();
  }

  async function loadData() {
    try {
      countryScores = await loadJson(DATA_URLS.countryScores);
      return true;
    } catch (error) {
      showError(error.message);
      return false;
    }
  }

  function showError(message) {
    errorMsg.textContent = message;
    errorMsg.classList.add('show');
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    }[char]));
  }

  function formatDate(isoDate) {
    return new Intl.DateTimeFormat('en-GB', {
      weekday: 'short',
      day: '2-digit',
      month: 'short',
      hour: '2-digit',
      minute: '2-digit',
      hourCycle: 'h23',
      timeZone: 'Europe/London'
    }).format(new Date(isoDate));
  }

  function getSortedScores() {
    const sorted = [...countryScores];
    const sortMode = sortSelect.value;

    if (sortMode === 'name') {
      sorted.sort((a, b) => a.countryName.localeCompare(b.countryName));
    } else if (sortMode === 'status') {
      sorted.sort((a, b) => {
        if (a.inCompetition !== b.inCompetition) return a.inCompetition ? -1 : 1;
        if (b.totalPoints !== a.totalPoints) return b.totalPoints - a.totalPoints;
        return a.countryName.localeCompare(b.countryName);
      });
    } else {
      sorted.sort((a, b) => {
        if (b.totalPoints !== a.totalPoints) return b.totalPoints - a.totalPoints;
        return a.countryName.localeCompare(b.countryName);
      });
    }

    return sorted;
  }

  function renderPointChips(items) {
    if (!items.length) return '<span class="point-chip">0</span>';
    return items.map(item => `
      <span class="point-chip ${item.value < 0 ? 'negative' : 'positive'}">
        <span>${escapeHtml(item.label)}</span>
        <strong>${item.value > 0 ? '+' : ''}${item.value}</strong>
      </span>
    `).join('');
  }

  function renderRoundDetail(country) {
    const details = country.detailsByRound[openDetail.round] || [];
    const title = `${country.countryName} - ${ROUND_LABELS[openDetail.round] || openDetail.round}`;

    return `
      <tr class="details-row">
        <td colspan="${ROUND_ORDER.length + 4}">
          <div class="round-detail">
            <div class="round-detail-title">${escapeHtml(title)}</div>
            ${details.length ? `
              <div class="breakdown-list">
                ${details.map(detail => `
                  <div class="breakdown-match">
                    <div>
                      <div class="breakdown-fixture" title="${escapeHtml(detail.fixture)}">${escapeHtml(detail.fixture)}</div>
                      <div class="breakdown-date">${escapeHtml(formatDate(detail.date))} BST</div>
                    </div>
                    <div class="point-chips">${renderPointChips(detail.points.items)}</div>
                    <div class="breakdown-total">${detail.points.total > 0 ? '+' : ''}${detail.points.total}</div>
                  </div>
                `).join('')}
              </div>
            ` : '<div class="empty-breakdown">No played matches or points recorded for this round yet.</div>'}
          </div>
        </td>
      </tr>
    `;
  }

  function renderTable() {
    const sortedScores = getSortedScores();
    scoresRoot.innerHTML = `
      <table>
        <thead>
          <tr>
            <th class="country-heading">Country</th>
            <th>Rank</th>
            <th>Status</th>
            ${ROUND_ORDER.map(round => `<th title="${escapeHtml(ROUND_LABELS[round])}">${escapeHtml(round)}</th>`).join('')}
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${sortedScores.map(country => {
            const isOpen = openDetail && openDetail.countryName === country.countryName;
            return `
              <tr class="team-row">
                <td>
                  <div class="country-cell">
                    <img class="flag" src="${country.flagUrl}" alt="${escapeHtml(country.countryName)} flag" loading="lazy" />
                    <div>
                      <div class="country-name" title="${escapeHtml(country.countryName)}">${escapeHtml(country.countryName)}</div>
                      <div class="country-meta">Group ${escapeHtml(country.group)}</div>
                    </div>
                  </div>
                </td>
                <td class="rank-cell">${escapeHtml(country.fifaRank)}</td>
                <td><span class="status-pill ${country.inCompetition ? '' : 'out'}">${country.inCompetition ? 'In' : 'Out'}</span></td>
                ${ROUND_ORDER.map(round => {
                  const score = country.byRound[round] || 0;
                  const active = isOpen && openDetail.round === round;
                  return `
                    <td>
                      <button
                        class="round-score-btn ${score ? 'has-score' : ''} ${active ? 'active' : ''}"
                        type="button"
                        data-country="${escapeHtml(country.countryName)}"
                        data-round="${escapeHtml(round)}"
                        title="Show ${escapeHtml(country.countryName)} ${escapeHtml(round)} breakdown"
                      >${score}</button>
                    </td>
                  `;
                }).join('')}
                <td class="total-cell">${country.totalPoints}</td>
              </tr>
              ${isOpen ? renderRoundDetail(country) : ''}
            `;
          }).join('')}
        </tbody>
      </table>
    `;

    document.querySelectorAll('.round-score-btn').forEach(button => {
      button.addEventListener('click', () => {
        const next = {
          countryName: button.dataset.country,
          round: button.dataset.round
        };
        const same = openDetail &&
          openDetail.countryName === next.countryName &&
          openDetail.round === next.round;
        openDetail = same ? null : next;
        renderTable();
      });
    });
  }

  sortSelect.addEventListener('change', () => {
    openDetail = null;
    renderTable();
  });

  async function init() {
    if (await loadData()) {
      renderTable();
    }
  }

  init();
</script>
</body>
</html>
