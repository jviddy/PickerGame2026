<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Results Admin - PickerGame 2026</title>
  <style>
    :root {
      --pitch: #1a3352;
      --pitch-mid: #2d5a8e;
      --pitch-bright: #3d7bc4;
      --lime: #5a9fd4;
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d9e2dc;
      --soft: #f5f8f6;
      --gold: #d79a2b;
      --danger: #b91c1c;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: #f0f4f8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      color: var(--white);
      background:
        linear-gradient(135deg, #1a3352 0%, #1e4070 100%);
      box-shadow: 0 2px 10px rgba(11, 79, 47, 0.24);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      letter-spacing: 0;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
    }

    main {
      width: min(1280px, calc(100% - 28px));
      margin: 18px auto 44px;
    }

    .toolbar,
    .match-list,
    .editor {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 170px 170px;
      gap: 10px;
      padding: 14px;
      margin-bottom: 14px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 9px;
      color: var(--ink);
      font: inherit;
      background: var(--white);
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--white);
      background: var(--pitch-mid);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    button:hover:not(:disabled) { background: var(--pitch); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .status {
      min-height: 22px;
      margin: -4px 0 14px;
      color: var(--muted);
      font-weight: 800;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--pitch); }

    .layout {
      display: grid;
      grid-template-columns: minmax(420px, 0.95fr) minmax(420px, 1.05fr);
      gap: 14px;
      align-items: start;
    }

    .match-list {
      overflow: hidden;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      color: var(--white);
      background: var(--pitch);
      font-weight: 900;
    }

    .matches {
      max-height: calc(100vh - 190px);
      overflow: auto;
    }

    .match-row {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) 70px;
      gap: 9px;
      width: 100%;
      min-height: 54px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      padding: 9px 10px;
      color: var(--ink);
      background: var(--white);
      text-align: left;
    }

    .round-header {
      padding: 6px 12px;
      font-size: 0.68rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--white);
      background: var(--pitch-mid);
      border-bottom: 1px solid var(--line);
    }
    .match-row.active { background: #e6f5eb; }
    .match-row.played .match-id { color: var(--pitch); }

    .match-id {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .fixture {
      min-width: 0;
      font-size: 0.9rem;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .score-tag {
      justify-self: end;
      align-self: center;
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--pitch);
      background: #eaf4ee;
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .score-tag.pending {
      color: var(--muted);
      background: var(--soft);
    }

    .editor {
      position: sticky;
      top: 78px;
      overflow: hidden;
    }

    .editor-head {
      padding: 13px 14px;
      color: var(--white);
      background: var(--pitch);
    }

    .editor-head h2 {
      margin: 0 0 4px;
      font-size: 1rem;
    }

    .editor-head .meta { color: rgba(255, 255, 255, 0.8); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 14px;
    }

    .section-title {
      grid-column: 1 / -1;
      margin: 4px 0 -2px;
      color: var(--pitch);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .check-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      grid-column: 1 / -1;
    }

    .check-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 9px;
      color: var(--ink);
      text-transform: none;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .check-row input {
      width: 16px;
      min-height: 16px;
    }

    .preview {
      border-top: 1px solid var(--line);
      background: var(--soft);
      padding: 12px 14px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .points-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 10px;
    }

    .points-card h3 {
      margin: 0 0 8px;
      color: var(--pitch);
      font-size: 0.92rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .point-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 3px 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .point-line strong { color: var(--ink); }
    .point-line.total {
      margin-top: 6px;
      padding-top: 7px;
      border-top: 1px solid var(--line);
      color: var(--pitch);
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 14px 14px;
      border-top: 1px solid var(--line);
    }

    .empty {
      padding: 40px 14px;
      text-align: center;
      color: var(--muted);
      font-weight: 900;
    }

    @media (max-width: 960px) {
      .toolbar,
      .layout,
      .form-grid,
      .preview-grid {
        grid-template-columns: 1fr;
      }

      .editor { position: static; }
      .matches { max-height: none; }
      .check-row { grid-template-columns: 1fr; }
    }

    .group-qual-section {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      margin-top: 14px;
      overflow: hidden;
    }

    .group-qual-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .group-qual-note {
      font-weight: 400;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .group-qual-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      padding: 16px;
    }

    .group-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    .group-card-head {
      background: var(--pitch);
      color: var(--white);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 6px 10px;
    }

    .group-card-body { padding: 4px 0; }

    .group-team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .group-team-row:hover { background: var(--soft); }

    .group-team-row input[type="checkbox"] {
      width: 14px;
      min-height: 14px;
      cursor: pointer;
    }

    .group-team-row label { cursor: pointer; flex: 1; }

    .group-qual-actions {
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      text-align: right;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>Match Results Admin</h1>
      <nav class="nav" aria-label="Admin navigation">
        <a href="admin.html">Entries</a>
        <a href="admin-results.html" style="background:rgba(255,255,255,0.15);">Results</a>
        <a href="admin-blog.html">Updates</a>
        <a href="admin-match-reports.html">Reports</a>
        <a href="admin-matches.html">Teams</a>
        <a href="admin-email.html">Email</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="toolbar">
      <label>
        Admin token
        <input id="adminToken" type="password" autocomplete="current-password" />
      </label>
      <label>
        Round
        <select id="roundFilter"></select>
      </label>
      <label>
        Status
        <select id="statusFilter">
          <option value="all">All matches</option>
          <option value="pending">Pending</option>
          <option value="played">Played</option>
        </select>
      </label>
    </section>

    <div id="status" class="status">Loading matches...</div>

    <section class="layout">
      <div class="match-list">
        <div class="list-head">
          <span>Matches</span>
          <span id="matchCount">0</span>
        </div>
        <div id="matchesList" class="matches"></div>
      </div>

      <div id="editor" class="editor">
        <div class="empty">Select a match to enter or update its result.</div>
      </div>
    </section>

    <section class="group-qual-section">
      <div class="group-qual-head">
        <span>Group Stage Qualification</span>
        <span class="group-qual-note">Set after all group matches are complete. Check every team that has qualified for the knockout stage, then submit.</span>
      </div>
      <div id="groupQualGrid" class="group-qual-grid"></div>
      <div class="group-qual-actions">
        <button id="submitGroupQual" type="button">Save qualification and publish</button>
      </div>
    </section>
  </main>

  <script>
    const ROUND_ORDER = ['GS1', 'GS2', 'GS3', 'R32', 'R16', 'QF', 'SF', 'TPP', 'F'];
    const ROUND_LABELS = {
      GS1: 'Group Stage · Round 1', GS2: 'Group Stage · Round 2', GS3: 'Group Stage · Round 3',
      R32: 'Round of 32', R16: 'Round of 16', QF: 'Quarter-Finals',
      SF: 'Semi-Finals', TPP: 'Third Place Play-off', F: 'Final',
    };
    const DATA_URLS = {
      matches: './Data/matches.json',
      teams: './Data/teams.json',
      results: '/api/results',
      predictions: './Data/predictions.json',
      settings: './Data/settings.json'
    };

    const tokenInput = document.getElementById('adminToken');
    const roundFilter = document.getElementById('roundFilter');
    const statusFilter = document.getElementById('statusFilter');
    const statusEl = document.getElementById('status');
    const matchesList = document.getElementById('matchesList');
    const matchCount = document.getElementById('matchCount');
    const editor = document.getElementById('editor');

    let matches = [];
    let teams = [];
    let results = [];
    let predictions = {};
    let groupStandings = null;
    let settings = {};
    let selectedMatchId = null;

    tokenInput.value = localStorage.getItem('pickerGameAdminToken') || '';

    function setStatus(message, type = '') {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    async function loadJson(url) {
      const response = await fetch(`${url}?v=${Date.now()}`);
      if (!response.ok) throw new Error(`Could not load ${url}`);
      return response.json();
    }

    async function loadJsonWithFallback(primaryUrl, fallbackUrl) {
      try {
        const response = await fetch(`${primaryUrl}?v=${Date.now()}`);
        if (response.ok) return response.json();
      } catch (_) {}
      return loadJson(fallbackUrl);
    }

    function getTeam(teamRef) {
      // Handle "1A (Mexico)" format — extract the country name from parens
      const parenMatch = teamRef && teamRef.match(/\(([^)]+)\)$/);
      const name = parenMatch ? parenMatch[1] : teamRef;
      return teams.find(team => team.groupId === name || team.countryName === name);
    }

    const GS_ROUNDS = new Set(['GS1', 'GS2', 'GS3']);

    function buildGroupStandings() {
      if (groupStandings) return groupStandings;
      const rows = {};
      for (const team of teams) {
        if (!team.group) continue;
        rows[team.group] = rows[team.group] || [];
        rows[team.group].push({ team, pts: 0, gf: 0, ga: 0 });
      }
      for (const match of matches) {
        if (!GS_ROUNDS.has(match.roundCode) || !match.played || !match.result) continue;
        const r = match.result;
        const h = Object.values(rows).flat().find(x => x.team.countryName === match.homeTeam);
        const a = Object.values(rows).flat().find(x => x.team.countryName === match.awayTeam);
        if (!h || !a) continue;
        h.gf += r.homeScore; h.ga += r.awayScore;
        a.gf += r.awayScore; a.ga += r.homeScore;
        if (r.homeScore > r.awayScore) h.pts += 3;
        else if (r.homeScore === r.awayScore) { h.pts += 1; a.pts += 1; }
        else a.pts += 3;
      }
      groupStandings = {};
      for (const [g, list] of Object.entries(rows)) {
        groupStandings[g] = list.sort((a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          const gda = a.gf - a.ga, gdb = b.gf - b.ga;
          if (gdb !== gda) return gdb - gda;
          if (b.gf !== a.gf) return b.gf - a.gf;
          return (a.team.fifaRank || 999) - (b.team.fifaRank || 999);
        });
      }
      return groupStandings;
    }

    // Returns the team object for a KO slot ref like "1A", "2B", "1A (Mexico)" etc.
    // Returns null if it can't be resolved (e.g. "3ABCDF", "TBD").
    function resolveKOTeam(ref) {
      if (!ref || ref === 'TBD') return null;
      const parenMatch = ref.match(/\(([^)]+)\)$/);
      if (parenMatch) return teams.find(t => t.countryName === parenMatch[1]) || null;
      const direct = teams.find(t => t.countryName === ref);
      if (direct) return direct;
      const m = ref.match(/^(\d)([A-Z])$/);
      if (m) return buildGroupStandings()[m[2]]?.[parseInt(m[1]) - 1]?.team || null;
      return null;
    }

    // Is this ref something the admin needs to assign manually? (3rd-place or TBD)
    function isManualSlot(ref) {
      if (!ref || ref === 'TBD') return true;
      if (/^\d[A-Z]{2,}/.test(ref)) return true; // "3ABCDF" etc
      return false;
    }

    function getDisplayName(ref) {
      return resolveKOTeam(ref)?.countryName || getTeamName(ref);
    }

    function getTeamName(teamRef) {
      return getTeam(teamRef)?.countryName || teamRef || 'TBA';
    }

    function getResult(matchId) {
      if (!matchId || !Array.isArray(results)) return null;
      return results.find(result => result && result.matchId === matchId) || null;
    }

    function isPlayed(result) {
      return Boolean(result && result.homeScore !== null && result.awayScore !== null);
    }

    function getDisplayResult(match) {
      if (!match) return null;
      return getResult(match.matchId) || match.result || null;
    }

    function formatDate(isoDate) {
      return new Intl.DateTimeFormat('en-GB', {
        weekday: 'short',
        day: '2-digit',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit',
        hourCycle: 'h23',
        timeZone: 'Europe/London'
      }).format(new Date(isoDate));
    }

    function getResultType(goalsFor, goalsAgainst, penaltiesFor, penaltiesAgainst, roundCode) {
      if (goalsFor > goalsAgainst) return 'win';
      if (goalsFor < goalsAgainst) return 'loss';
      if (!String(roundCode).includes('GS') && penaltiesFor !== null && penaltiesAgainst !== null) {
        return penaltiesFor > penaltiesAgainst ? 'win' : 'loss';
      }
      return 'draw';
    }

    function toNumber(value, allowNull = false) {
      if (value === '' || value === null || value === undefined) return allowNull ? null : 0;
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function calculateSidePoints(match, result, side) {
      const isHome = side === 'home';
      const goalsFor = isHome ? result.homeScore : result.awayScore;
      const goalsAgainst = isHome ? result.awayScore : result.homeScore;
      const penaltiesFor = isHome ? result.homePenalties : result.awayPenalties;
      const penaltiesAgainst = isHome ? result.awayPenalties : result.homePenalties;
      const yellowCards = isHome ? result.homeYellow : result.awayYellow;
      const redCards = isHome ? result.homeRed : result.awayRed;
      const qualified = isHome ? result.homeQualified : result.awayQualified;
      const pointRules = settings.points || {};
      const rows = [];
      const categories = {
        result: 0,
        goalsScored: goalsFor * (pointRules.goalScored || 0),
        goalsConceded: goalsAgainst * (pointRules.goalConceded || 0),
        penalties: 0,
        disciplinary: ((yellowCards || 0) * (pointRules.yellowCard || 0)) + ((redCards || 0) * (pointRules.redCard || 0)),
        roundQualification: 0
      };

      const add = (label, value) => {
        if (value) rows.push({ label, value });
      };

      const resultType = getResultType(goalsFor, goalsAgainst, penaltiesFor, penaltiesAgainst, match.roundCode);
      if (resultType === 'win') categories.result = pointRules.win || 0;
      if (resultType === 'draw') categories.result = pointRules.draw || 0;

      if (qualified) {
        categories.roundQualification = String(match.roundCode).includes('GS')
          ? pointRules.qualifyKnockout || 0
          : match.roundCode === 'F' ? 0 : pointRules.qualifyNextRound || 0;
      }

      if (match.roundCode === 'F' && resultType === 'win') {
        categories.roundQualification += pointRules.winFinal || 0;
      }

      add(resultType === 'win' ? 'Win' : resultType === 'draw' ? 'Draw' : 'Loss', categories.result);
      add('Goals scored', categories.goalsScored);
      add('Goals conceded', categories.goalsConceded);
      add('Cards', categories.disciplinary);
      add('Qualification', categories.roundQualification);

      const total = Object.values(categories).reduce((sum, value) => sum + value, 0);
      return { rows, categories, total };
    }

    function readFormResult() {
      const match = matches.find(m => m.matchId === selectedMatchId);
      const isKO = match && !GS_ROUNDS.has(match.roundCode);
      const homeScore = toNumber(document.getElementById('homeScore')?.value);
      const awayScore = toNumber(document.getElementById('awayScore')?.value);
      const homePenalties = toNumber(document.getElementById('homePenalties')?.value, true);
      const awayPenalties = toNumber(document.getElementById('awayPenalties')?.value, true);

      let homeQualified, awayQualified;
      if (isKO) {
        if (homeScore > awayScore) {
          homeQualified = true; awayQualified = false;
        } else if (awayScore > homeScore) {
          homeQualified = false; awayQualified = true;
        } else if (homePenalties !== null && awayPenalties !== null && homePenalties !== awayPenalties) {
          homeQualified = homePenalties > awayPenalties;
          awayQualified = awayPenalties > homePenalties;
        }
      }

      return {
        matchId: selectedMatchId,
        homeScore,
        awayScore,
        homePenalties,
        awayPenalties,
        homeYellow: toNumber(document.getElementById('homeYellow')?.value),
        awayYellow: toNumber(document.getElementById('awayYellow')?.value),
        homeRed: toNumber(document.getElementById('homeRed')?.value),
        awayRed: toNumber(document.getElementById('awayRed')?.value),
        ...(isKO && homeQualified !== undefined ? { homeQualified, awayQualified } : {}),
      };
    }

    function renderPointRows(points) {
      const rows = points.rows.length ? points.rows : [{ label: 'No points', value: 0 }];
      return rows.map(row => `
        <div class="point-line">
          <span>${escapeHtml(row.label)}</span>
          <strong>${row.value > 0 ? '+' : ''}${row.value}</strong>
        </div>
      `).join('') + `
        <div class="point-line total">
          <span>Total</span>
          <strong>${points.total > 0 ? '+' : ''}${points.total}</strong>
        </div>
      `;
    }

    function updatePreview() {
      const match = matches.find(item => item.matchId === selectedMatchId);
      if (!match) return;
      const previewResult = readFormResult();
      const home = calculateSidePoints(match, previewResult, 'home');
      const away = calculateSidePoints(match, previewResult, 'away');
      document.getElementById('homePreview').innerHTML = renderPointRows(home);
      document.getElementById('awayPreview').innerHTML = renderPointRows(away);

      const qualEl = document.getElementById('qualPreview');
      if (!qualEl) return;
      const isKO = !GS_ROUNDS.has(match.roundCode);
      if (!isKO) return;
      const { homeQualified, awayQualified, homeScore, awayScore, homePenalties, awayPenalties } = previewResult;
      const homeName = getDisplayName(match.homeTeam);
      const awayName = getDisplayName(match.awayTeam);
      if (homeQualified !== undefined) {
        const winner = homeQualified ? homeName : awayName;
        const via = (homeScore === awayScore) ? ' (via penalties)' : '';
        qualEl.textContent = `✓ ${winner} qualifies${via}`;
        qualEl.style.color = 'var(--pitch)';
      } else if (homeScore === awayScore && (homePenalties === null || awayPenalties === null || homePenalties === awayPenalties)) {
        qualEl.textContent = 'Drawn — enter penalty shootout scores to determine qualifier.';
        qualEl.style.color = 'var(--muted)';
      } else {
        qualEl.textContent = 'Enter goals (and penalties if drawn) to determine qualification.';
        qualEl.style.color = 'var(--muted)';
      }
    }

    function teamOptions(selectedName) {
      const sorted = [...teams].sort((a, b) => a.countryName.localeCompare(b.countryName));
      return '<option value="">— select team —</option>' +
        sorted.map(t => `<option value="${escapeHtml(t.countryName)}"${t.countryName === selectedName ? ' selected' : ''}>${escapeHtml(t.countryName)}</option>`).join('');
    }

    function renderEditor(match) {
      if (!match) {
        editor.innerHTML = '<div class="empty">Select a match to enter or update its result.</div>';
        return;
      }
      const result = getDisplayResult(match) || {};
      const isKO = !GS_ROUNDS.has(match.roundCode);
      const homeName = isKO ? getDisplayName(match.homeTeam) : getTeamName(match.homeTeam);
      const awayName = isKO ? getDisplayName(match.awayTeam) : getTeamName(match.awayTeam);
      const homeManual = isKO && isManualSlot(match.homeTeam);
      const awayManual = isKO && isManualSlot(match.awayTeam);

      // Current prediction
      const pred = predictions[match.matchId] || '';
      const [predH, predA] = pred ? pred.split('-').map(Number) : [null, null];

      editor.innerHTML = `
        <div class="editor-head">
          <h2>${escapeHtml(homeName)} v ${escapeHtml(awayName)}</h2>
          <div class="meta">${escapeHtml(match.matchId)} · ${escapeHtml(match.roundCode)} · ${escapeHtml(formatDate(match.date))} BST</div>
        </div>

        ${(homeManual || awayManual) ? `
        <div class="form-grid">
          <div class="section-title">Team assignment</div>
          ${homeManual ? `
          <label>${escapeHtml(match.homeTeam)} (home)
            <select id="homeTeamSlot">${teamOptions(resolveKOTeam(match.homeTeam)?.countryName || '')}</select>
          </label>` : ''}
          ${awayManual ? `
          <label>${escapeHtml(match.awayTeam)} (away)
            <select id="awayTeamSlot">${teamOptions(resolveKOTeam(match.awayTeam)?.countryName || '')}</select>
          </label>` : ''}
          <div class="actions" style="padding:0 0 8px">
            <button id="saveTeamSlot" type="button">Save team assignment</button>
            <span id="teamSlotStatus" style="font-size:0.8rem;margin-left:8px"></span>
          </div>
        </div>` : ''}

        <div class="form-grid">
          <div class="section-title">Your prediction</div>
          <div style="display:flex;align-items:center;gap:8px;padding:0 0 4px;grid-column:1/-1">
            <label style="flex:none">${escapeHtml(homeName)}<input id="predHome" type="number" min="0" step="1" value="${predH ?? ''}" style="width:60px" /></label>
            <span style="font-weight:700;align-self:flex-end;padding-bottom:4px">–</span>
            <label style="flex:none">${escapeHtml(awayName)}<input id="predAway" type="number" min="0" step="1" value="${predA ?? ''}" style="width:60px" /></label>
            <button id="savePrediction" type="button" style="align-self:flex-end;min-height:34px;padding:0 14px;font-size:0.85rem">Save prediction</button>
            <span id="predStatus" style="font-size:0.8rem"></span>
          </div>

          <div class="section-title">Goals</div>
          <label>${escapeHtml(homeName)}<input id="homeScore" type="number" min="0" step="1" value="${result.homeScore ?? ''}" /></label>
          <label>${escapeHtml(awayName)}<input id="awayScore" type="number" min="0" step="1" value="${result.awayScore ?? ''}" /></label>
          <label>Home pens<input id="homePenalties" type="number" min="0" step="1" value="${result.homePenalties ?? ''}" /></label>
          <label>Away pens<input id="awayPenalties" type="number" min="0" step="1" value="${result.awayPenalties ?? ''}" /></label>

          <div class="section-title">Cards</div>
          <label>Home yellow<input id="homeYellow" type="number" min="0" step="1" value="${result.homeYellow ?? 0}" /></label>
          <label>Away yellow<input id="awayYellow" type="number" min="0" step="1" value="${result.awayYellow ?? 0}" /></label>
          <label>Home red<input id="homeRed" type="number" min="0" step="1" value="${result.homeRed ?? 0}" /></label>
          <label>Away red<input id="awayRed" type="number" min="0" step="1" value="${result.awayRed ?? 0}" /></label>

          ${isKO ? `
          <div class="section-title">Qualification (auto-calculated)</div>
          <div id="qualPreview" style="grid-column:1/-1;font-size:0.82rem;color:var(--muted);font-weight:700;padding:2px 0 4px">Enter goals (and penalties if drawn) to determine qualification.</div>
          ` : ''}
        </div>
        <div class="preview">
          <div class="preview-grid">
            <div class="points-card">
              <h3>${escapeHtml(homeName)}</h3>
              <div id="homePreview"></div>
            </div>
            <div class="points-card">
              <h3>${escapeHtml(awayName)}</h3>
              <div id="awayPreview"></div>
            </div>
          </div>
        </div>
        <div class="actions">
          <button id="submitResult" type="button">Submit result and publish</button>
        </div>
      `;

      editor.querySelectorAll('#homeScore,#awayScore,#homePenalties,#awayPenalties,#homeYellow,#awayYellow,#homeRed,#awayRed').forEach(input => {
        input.addEventListener('input', updatePreview);
        input.addEventListener('change', updatePreview);
      });
      document.getElementById('submitResult').addEventListener('click', submitResult);
      document.getElementById('savePrediction').addEventListener('click', () => savePrediction(match.matchId));
      if (homeManual || awayManual) {
        document.getElementById('saveTeamSlot').addEventListener('click', () => saveTeamSlot(match));
      }
      updatePreview();
    }

    function getFilteredMatches() {
      const round = roundFilter.value;
      const status = statusFilter.value;
      return [...matches]
        .filter(Boolean)
        .filter(match => round === 'all' || match.roundCode === round)
        .filter(match => {
          const played = isPlayed(getDisplayResult(match)) || match.played;
          if (status === 'played') return played;
          if (status === 'pending') return !played;
          return true;
        })
        .sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function renderMatches() {
      const filtered = getFilteredMatches();
      matchCount.textContent = `${filtered.length} matches`;

      // Group by round in canonical order
      const byRound = {};
      filtered.forEach(m => { (byRound[m.roundCode] = byRound[m.roundCode] || []).push(m); });
      const roundsPresent = ROUND_ORDER.filter(r => byRound[r]);

      matchesList.innerHTML = roundsPresent.map(roundCode => {
        const roundMatches = byRound[roundCode];
        const header = `<div class="round-header">${escapeHtml(ROUND_LABELS[roundCode] || roundCode)}</div>`;
        const rows = roundMatches.map(match => {
          const result = getDisplayResult(match);
          const played = isPlayed(result);
          const score = played ? `${result.homeScore}-${result.awayScore}` : 'Pending';
          return `
            <button class="match-row ${played ? 'played' : ''} ${selectedMatchId === match.matchId ? 'active' : ''}" type="button" data-match-id="${escapeHtml(match.matchId)}">
              <span class="match-id">${escapeHtml(match.matchId)}</span>
              <span>
                <span class="fixture">${escapeHtml(GS_ROUNDS.has(match.roundCode) ? getTeamName(match.homeTeam) : getDisplayName(match.homeTeam))} v ${escapeHtml(GS_ROUNDS.has(match.roundCode) ? getTeamName(match.awayTeam) : getDisplayName(match.awayTeam))}</span>
                <span class="meta">${escapeHtml(formatDate(match.date))} BST · ${escapeHtml(match.location)}</span>
              </span>
              <span class="score-tag ${played ? '' : 'pending'}">${escapeHtml(score)}</span>
            </button>`;
        }).join('');
        return header + rows;
      }).join('');

      matchesList.querySelectorAll('.match-row').forEach(row => {
        row.addEventListener('click', () => {
          selectedMatchId = row.dataset.matchId;
          renderMatches();
          renderEditor(matches.find(match => match.matchId === selectedMatchId));
        });
      });
    }

    async function submitResult() {
      const token = tokenInput.value.trim();
      if (!token) {
        setStatus('Enter your admin token before submitting.', 'error');
        return;
      }

      const result = readFormResult();
      if (result.homeScore === null || result.awayScore === null) {
        setStatus('Enter both goals scores before submitting.', 'error');
        return;
      }

      localStorage.setItem('pickerGameAdminToken', token);
      document.getElementById('submitResult').disabled = true;
      setStatus('Saving result and starting publish...');

      try {
        const response = await fetch('/api/admin/results', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify(result)
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.ok === false) {
          throw new Error((data.errors || ['Could not save result.']).join(' '));
        }

        const index = results.findIndex(item => item.matchId === result.matchId);
        if (index >= 0) results[index] = result;
        else results.push(result);
        renderMatches();
        renderEditor(matches.find(m => m.matchId === result.matchId));
        setStatus('Result saved. The publish workflow has started.', 'success');
      } catch (error) {
        setStatus(error.message, 'error');
      } finally {
        const button = document.getElementById('submitResult');
        if (button) button.disabled = false;
      }
    }

    function populateFilters() {
      roundFilter.innerHTML = '<option value="all">All rounds</option>' +
        ROUND_ORDER.map(round => `<option value="${round}">${round}</option>`).join('');
      roundFilter.addEventListener('change', renderMatches);
      statusFilter.addEventListener('change', renderMatches);
    }

    function isTeamQualified(countryName) {
      for (const result of results) {
        const match = matches.find(m => m.matchId === result.matchId);
        if (!match) continue;
        if (match.homeTeam === countryName && result.homeQualified) return true;
        if (match.awayTeam === countryName && result.awayQualified) return true;
      }
      return false;
    }

    function renderGroupQual() {
      const groups = {};
      teams.forEach(team => {
        groups[team.group] = groups[team.group] || [];
        groups[team.group].push(team);
      });

      document.getElementById('groupQualGrid').innerHTML = Object.keys(groups).sort().map(group => {
        const groupTeams = groups[group];
        return `
          <div class="group-card">
            <div class="group-card-head">Group ${escapeHtml(group)}</div>
            <div class="group-card-body">
              ${groupTeams.map(team => `
                <div class="group-team-row">
                  <input type="checkbox" id="gq_${escapeHtml(team.countryName)}" value="${escapeHtml(team.countryName)}" ${isTeamQualified(team.countryName) ? 'checked' : ''} />
                  <label for="gq_${escapeHtml(team.countryName)}">${escapeHtml(team.countryName)}</label>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    async function submitGroupQual() {
      const token = tokenInput.value.trim();
      if (!token) {
        setStatus('Enter your admin token before submitting.', 'error');
        return;
      }

      const qualifiedTeamIds = Array.from(
        document.querySelectorAll('#groupQualGrid input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      document.getElementById('submitGroupQual').disabled = true;
      setStatus('Saving group qualification...');

      try {
        const response = await fetch('/api/admin/group-qualification', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ qualifiedTeamIds }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.ok === false) {
          throw new Error((data.errors || ['Could not save group qualification.']).join(' '));
        }

        if (data.updatedResults) {
          for (const updated of data.updatedResults) {
            const index = results.findIndex(r => r.matchId === updated.matchId);
            if (index >= 0) results[index] = updated;
            else results.push(updated);
          }
        }

        setStatus('Group qualification saved. The publish workflow has started.', 'success');
        renderGroupQual();
        if (selectedMatchId) renderEditor(matches.find(m => m.matchId === selectedMatchId));
      } catch (error) {
        setStatus(error.message, 'error');
      } finally {
        const button = document.getElementById('submitGroupQual');
        if (button) button.disabled = false;
      }
    }

    async function savePrediction(matchId) {
      const token = tokenInput.value.trim();
      if (!token) { setStatus('Enter your admin token first.', 'error'); return; }
      const h = document.getElementById('predHome')?.value.trim();
      const a = document.getElementById('predAway')?.value.trim();
      const statusEl = document.getElementById('predStatus');
      const btn = document.getElementById('savePrediction');
      btn.disabled = true;
      statusEl.textContent = 'Saving…';
      const prediction = (h !== '' && a !== '') ? `${h}-${a}` : null;
      try {
        const res = await fetch('/api/admin/predictions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ matchId, prediction }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) throw new Error((data.errors || ['Failed.']).join(' '));
        if (prediction) predictions[matchId] = prediction;
        else delete predictions[matchId];
        statusEl.textContent = 'Saved';
        statusEl.style.color = 'green';
      } catch (err) {
        statusEl.textContent = err.message;
        statusEl.style.color = 'red';
      } finally {
        btn.disabled = false;
      }
    }

    async function saveTeamSlot(match) {
      const token = tokenInput.value.trim();
      if (!token) { setStatus('Enter your admin token first.', 'error'); return; }
      const statusEl = document.getElementById('teamSlotStatus');
      const btn = document.getElementById('saveTeamSlot');

      const homeSlotEl = document.getElementById('homeTeamSlot');
      const awaySlotEl = document.getElementById('awayTeamSlot');

      function buildValue(originalRef, selectedCountry) {
        if (!selectedCountry) return originalRef || 'TBD';
        // Preserve the positional ref prefix for 3rd-place codes
        if (/^\d[A-Z]+$/.test(originalRef || '')) return `${originalRef} (${selectedCountry})`;
        return selectedCountry;
      }

      const payload = { matchId: match.matchId };
      if (homeSlotEl) payload.homeTeam = buildValue(match.homeTeam, homeSlotEl.value);
      if (awaySlotEl) payload.awayTeam = buildValue(match.awayTeam, awaySlotEl.value);

      btn.disabled = true;
      statusEl.textContent = 'Saving…';
      try {
        const res = await fetch('/api/admin/matches', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) throw new Error((data.errors || ['Failed.']).join(' '));
        // Update local match
        const idx = matches.findIndex(m => m.matchId === match.matchId);
        if (idx >= 0) {
          if (payload.homeTeam) matches[idx] = { ...matches[idx], homeTeam: payload.homeTeam };
          if (payload.awayTeam) matches[idx] = { ...matches[idx], awayTeam: payload.awayTeam };
        }
        statusEl.textContent = 'Saved';
        statusEl.style.color = 'green';
        renderMatches();
        renderEditor(matches.find(m => m.matchId === match.matchId));
      } catch (err) {
        statusEl.textContent = err.message;
        statusEl.style.color = 'red';
      } finally {
        btn.disabled = false;
      }
    }

    function scrollToNextPending() {
      const allRows = Array.from(matchesList.querySelectorAll('.match-row'));
      if (!allRows.length) return;
      const firstPending = allRows.find(row => !row.classList.contains('played'));
      if (!firstPending) return;
      const idx = allRows.indexOf(firstPending);
      const anchorRow = allRows[Math.max(0, idx - 3)];
      anchorRow.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function init() {
      try {
        [matches, teams, results, settings, predictions] = await Promise.all([
          loadJson(DATA_URLS.matches),
          loadJson(DATA_URLS.teams),
          loadJsonWithFallback(DATA_URLS.results, './Data/results.json'),
          loadJson(DATA_URLS.settings),
          loadJson(DATA_URLS.predictions).catch(() => ({})),
        ]);
        groupStandings = null; // reset standings cache after data loads
        populateFilters();
        renderMatches();
        renderGroupQual();
        document.getElementById('submitGroupQual').addEventListener('click', submitGroupQual);
        setStatus('Select a match to enter or update its result.');
        setTimeout(scrollToNextPending, 80);
      } catch (error) {
        setStatus(error.message, 'error');
      }
    }

    init();
  </script>
</body>
</html>
